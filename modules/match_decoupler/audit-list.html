    /* 印章样式 - 浮动定位 */
    .stamp-seal {
      position: fixed;
      top: 80px;
      right: 450px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-15deg);
      z-index: 600;
      opacity: 0.9;

    .stamp-seal.pre-screen {

      color: #fff;
    }
    .stamp-seal.enrolling {

      box-shadow: 0 0 0 2px rgba(250,173,20,0.2), inset 0 0 0 2px rgba(250,173,20,0.1);
    }
    .stamp-seal.enrolling .stamp-text {
      background: #faad14;
      color: #fff;
    }
    .stamp-seal.completed-in {
      border: 4px solid #52c41a;
      box-shadow: 0 0 0 2px rgba(82,196,26,0.2), inset 0 0 0 2px rgba(82,196,26,0.1);
    }

      background: #52c41a;
      color: #fff;
    }
    .stamp-seal.completed-ex {
      border: 4px solid #ff4d4f;
      box-shadow: 0 0 0 2px rgba(255,77,79,0.2), inset 0 0 0 2px rgba(255,77,79,0.1);
    }
    .stamp-seal.completed-ex .stamp-text {

      color: #fff;

    .stamp-seal.pending {

      box-shadow: 0 0 0 2px rgba(140,140,140,0.2), inset 0 0 0 2px rgba(140,140,140,0.1);
    }
    .stamp-seal.pending .stamp-text {
      background: #8c8c8c;
      color: #fff;
    }
    .stamp-seal::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      border: 2px dashed currentColor;
      border-radius: 50%;
      opacity: 0.3;

// ==================== SVG CONNECTOR LINES ====================
let svgContainer = null;

function createSvgContainer() {
  if (!svgContainer) {
    svgContainer = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svgContainer.classList.add('svg-connector');
    svgContainer.id = 'svgConnector';
    document.body.appendChild(svgContainer);
  }
  return svgContainer;
}

function clearSvgLines() {
  if (svgContainer) {
    while (svgContainer.firstChild) {
      svgContainer.removeChild(svgContainer.firstChild);
    }
  }
}

function drawConnectorLines() {
  clearSvgLines();
  const container = createSvgContainer();
  
  // 获取所有"查看"按钮
  const viewButtons = document.querySelectorAll('[class*="view-btn-"]');
  if (viewButtons.length === 0) return;
  
  // 获取PRD侧边栏的"数据与状态对应关系"标题位置（通过固定ID）
  const prdTitle = document.getElementById('dataStatusTitle');
  if (!prdTitle) {
    console.log('未找到 dataStatusTitle 元素');
    return;
  }
  
  // 使用 getBoundingClientRect + scroll 获取相对于视口的绝对位置
  const prdRect = prdTitle.getBoundingClientRect();
  const targetX = prdRect.left - 10 + window.scrollX;
  const targetY = prdRect.top + prdRect.height / 2 + window.scrollY;
  
  // 为每个"查看"按钮绘制线条
  viewButtons.forEach((btn, index) => {
    // 使用 getBoundingClientRect + scroll 获取相对于视口的绝对位置
    const btnRect = btn.getBoundingClientRect();
    const startX = btnRect.right + 5 + window.scrollX;
    const startY = btnRect.top + btnRect.height / 2 + window.scrollY;
    
    // 创建贝塞尔曲线路径
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const controlX1 = startX + 100;
    const controlX2 = targetX - 100;
    
    path.setAttribute('d', `M ${startX} ${startY} C ${controlX1} ${startY}, ${controlX2} ${targetY}, ${targetX} ${targetY}`);
    path.setAttribute('stroke', '#fa8c16');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', '0.6');
    path.setAttribute('stroke-dasharray', '5,5');
    
    // 添加动画效果
    const animate = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
    animate.setAttribute('attributeName', 'stroke-dashoffset');
    animate.setAttribute('from', '10');
    animate.setAttribute('to', '0');
    animate.setAttribute('dur', '1s');
    animate.setAttribute('repeatCount', 'indefinite');
    path.appendChild(animate);
    
    container.appendChild(path);
    
    // 只在第一个按钮上显示箭头
    if (index === 0) {
      const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      // 箭头指向左侧（朝向标题框）
      arrow.setAttribute('points', `${targetX+5},${targetY-5} ${targetX},${targetY} ${targetX+5},${targetY+5}`);
      arrow.setAttribute('fill', '#fa8c16');
      arrow.setAttribute('opacity', '0.8');
      container.appendChild(arrow);
    }
  });
}

});

function showToast(msg, type) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'info');
  t.innerHTML = '<i class="fas fa-'+(type==='success'?'check-circle':'info-circle')+'" style="color:'+(type==='success'?'#52c41a':'#1677ff')+'"></i>' + msg;
  c.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2500);
}

function openDetailById(id) {
  const row = auditData.find(r => r.id === id);
  if (!row) return;
  currentDetailRow = row;
  detailTab = 'history';
  const overlay = document.getElementById('detailOverlay');
  document.getElementById('detailMain').innerHTML = buildDetailContent(row);
  overlay.classList.add('show');
  document.body.classList.add('detail-open');
  renderPrdSidebar();
  renderDetailPrd();
}
function scrollToAudit() {
  const bar = document.getElementById('auditActionBar');
  if (bar) bar.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
function submitAudit(result) {
  const sel = document.getElementById('auditResultSelect');
  const comment = document.getElementById('auditCommentInput');
  const r = sel ? sel.value : '';
  if (!r) { showToast('请先选择审批结果','info'); return; }
  const label = r === 'pass' ? '通过' : '拒绝';
  showToast('审批'+label+'成功！'+(comment&&comment.value?' 意见：'+comment.value:''),'success');
  if (currentDetailRow) currentDetailRow.status = r === 'pass' ? 'done' : 'done';
  setTimeout(() => closeDetail(), 1500);
}
function closeDetail() { document.getElementById('detailOverlay').classList.remove('show'); document.body.classList.remove('detail-open'); currentDetailRow = null; renderPrdSidebar(); renderDetailPrd(); }
function switchDetailTab(tab) {
  detailTab = tab;
  document.querySelectorAll('.detail-tab').forEach(el => el.classList.toggle('active', el.getAttribute('data-tab')===tab));
  document.querySelectorAll('.detail-tab-content').forEach(el => el.classList.toggle('active', el.id==='detailTab_'+tab));
}
function getStageClass(s) { if(!s)return'pending'; if(s.includes('预筛'))return'pre-screen'; if(s.includes('入组')&&!s.includes('已完成'))return'enrolling'; if(s.includes('已完成（入组）'))return'completed-in'; if(s.includes('已完成（排除）'))return'completed-ex'; if(s.includes('待分配'))return'pending'; return'pending'; }
function getStageIcon(s) { if(!s)return'⏳'; if(s.includes('预筛'))return'🔍'; if(s.includes('入组')&&!s.includes('已完成'))return'📋'; if(s.includes('已完成（入组）'))return'✅'; if(s.includes('已完成（排除）'))return'❌'; if(s.includes('待分配'))return'⏳'; return'⏳'; }
function getStageDesc(s) { if(!s)return''; if(s.includes('待分配'))return'系统正在分配审批人，请稍候...'; if(s.includes('预筛'))return'请等待审批员完成审批'; if(s.includes('入组'))return'请等待审批员完成入组审批'; if(s.includes('已完成'))return'审批流程已结束'; return''; }

// 根据匹配状态生成占位HTML（用于匹配详情/预筛表）
function buildMatchStatusPlaceholder(status, tabName) {
  if (status === 'success') return ''; // 匹配成功，不显示占位
  if (status === 'matching') {
    return `<div class="match-status-loading">
      <div class="loading-spinner"></div>
      <div class="status-title">正在匹配中，请稍后...</div>
      <div class="status-desc">AI正在对${tabName}进行智能提取与分析，请耐心等待</div>
    </div>`;
  }
  if (status === 'failed') {
    return `<div class="match-status-empty">
      <i class="fas fa-times-circle"></i>
      <div class="status-title">匹配失败</div>
      <div class="status-desc">若有需要，请重新匹配</div>
      <button class="btn-match" onclick="showToast('匹配功能开发中','info')"><i class="fas fa-redo"></i> 重新匹配</button>
    </div>`;
  }
  // none - 未匹配
  return `<div class="match-status-empty">
    <i class="fas fa-robot"></i>
    <div class="status-title">暂无${tabName}数据</div>
    <div class="status-desc">如果您希望用AI进行智能提取，可点击项目匹配</div>
    <button class="btn-match" onclick="showToast('匹配功能开发中','info')"><i class="fas fa-play-circle"></i> 开始项目匹配</button>
  </div>`;
}

function openAuditRecord(id) {
  const flow = auditFlowData[id];
  const row = auditData.find(r => r.id === id);
  if (!flow || !row) { showToast('暂无审批记录','info'); return; }
  const overlay = document.getElementById('auditRecordOverlay');
  let html = '<div class="audit-record-modal"><div class="audit-record-header"><h3>审批记录 - '+row.screenNo+'</h3><button class="audit-record-close" onclick="closeAuditRecord()"><i class="fas fa-times"></i></button></div><div class="audit-record-body">';
  if (flow.prescreen && flow.prescreen.length > 0) html += buildAuditGroup('预筛审批', flow.prescreen);
  if (flow.enrolling && flow.enrolling.length > 0) html += buildAuditGroup('入组审批', flow.enrolling);
  if ((!flow.prescreen||flow.prescreen.length===0)&&(!flow.enrolling||flow.enrolling.length===0)) html += '<div style="text-align:center;padding:40px;color:#aaa">暂无审批记录</div>';
  html += '</div></div>';
  overlay.innerHTML = html;
  overlay.classList.add('show');
  overlay.onclick = function(e) { if(e.target===overlay) closeAuditRecord(); };
}
function closeAuditRecord() { const o=document.getElementById('auditRecordOverlay'); o.classList.remove('show'); o.innerHTML=''; }
function buildAuditGroup(title, rows) {
  let h = '<div class="audit-group"><div class="audit-group-header" onclick="this.classList.toggle(\'collapsed\');this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'\':\'none\'"><i class="fas fa-chevron-down"></i>'+title+'（'+rows.length+'条记录）</div><table class="audit-group-table"><thead><tr><th>操作人</th><th>角色</th><th>状态</th><th>时间</th><th>耗时</th></tr></thead><tbody>';
  rows.forEach(r => {
    h += '<tr><td>'+r.operator+'</td><td>'+r.role+'</td><td><span class="status-tag '+r.statusClass+'">'+r.status+'</span></td><td>'+r.time+'</td><td>'+r.duration+'</td></tr>';
    if (r.children) r.children.forEach(c => {
      h += '<tr style="background:#fafafa"><td style="padding-left:28px">↳ '+c.operator+'</td><td>'+c.role+'</td><td><span class="status-tag '+c.statusClass+'">'+c.status+'</span></td><td>'+c.time+'</td><td>'+c.duration+'</td></tr>';
    });
  });
  h += '</tbody></table></div>';
  return h;
}
