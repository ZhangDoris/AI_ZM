<div id="desensitize-module">
  <div class="breadcrumb">当前位置：<span onclick="switchModule('desensitize')">脱敏管理</span></div>
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px">
    <button class="btn btn-default">🔍 测试脱敏</button>
    <button class="btn btn-primary">＋ 新增规则</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px">
    <div class="stat-card"><div class="stat-icon" style="background:#f5f3ff"><span style="font-size:22px">🛡️</span></div><div class="stat-info"><div class="stat-value">5</div><div class="stat-label">脱敏规则数</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#eff6ff"><span style="font-size:22px">📊</span></div><div class="stat-info"><div class="stat-value">12,847</div><div class="stat-label">今日脱敏处理条数</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:#f0fdf4"><span style="font-size:22px">✅</span></div><div class="stat-info"><div class="stat-value">100%</div><div class="stat-label">脱敏合规率</div></div></div>
  </div>
  <div class="table-card">
    <table class="data-table">
      <thead>
        <tr><th>字段名称</th><th>脱敏类型</th><th>脱敏方法</th><th>适用范围</th><th>状态</th><th>操作</th></tr>
      </thead>
      <tbody id="desensitizeTableBody">
        <!-- 数据将通过JavaScript动态加载 -->
      </tbody>
    </table>
  </div>
</div>

<script>
// 脱敏管理模块初始化
function initDesensitizeModule(subModule) {
  console.log('初始化脱敏管理模块:', subModule);
  loadDesensitizeData();
}

// 加载脱敏规则数据
function loadDesensitizeData() {
  const rules = [
    { field:'姓名', type:'姓名脱敏', method:'保留姓氏，名字替换为*', scope:'全部项目', status:'启用' },
    { field:'手机号', type:'电话脱敏', method:'保留前3位和后4位，中间替换为****', scope:'全部项目', status:'启用' },
    { field:'身份证号', type:'证件脱敏', method:'保留前6位和后4位，中间替换为*', scope:'全部项目', status:'启用' },
    { field:'住址', type:'地址脱敏', method:'仅显示至城市级别', scope:'导出场景', status:'启用' },
    { field:'诊断信息', type:'医疗脱敏', method:'替换为疾病分类代码', scope:'对外报告', status:'禁用' }
  ];
  
  const tbody = document.getElementById('desensitizeTableBody');
  if (tbody) {
    tbody.innerHTML = rules.map(r => `
      <tr>
        <td><strong>${r.field}</strong></td>
        <td><span class="badge badge-purple">${r.type}</span></td>
        <td style="font-size:13px;color:#555">${r.method}</td>
        <td><span class="tag">${r.scope}</span></td>
        <td>${r.status==='启用'?'<span class="badge badge-success">已启用</span>':'<span class="badge badge-gray">已禁用</span>'}</td>
        <td>
          <span class="action-link">编辑</span>
          <span class="action-sep">|</span>
          <span class="action-link">测试</span>
          <span class="action-sep">|</span>
          <span class="action-link" style="color:${r.status==='启用'?'#ff4d4f':'#16a34a'}">${r.status==='启用'?'禁用':'启用'}</span>
        </td>
      </tr>
    `).join('');
  }
}
</script>

<style>
/* 脱敏管理模块特定样式 */
</style>
