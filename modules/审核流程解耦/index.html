    'test': 'initTestModule'
  };
  
  // 如果是在文件协议下（file://），直接使用内联生成，避免CORS错误
  if (window.location.protocol === 'file:') {
    console.log('文件协议下，使用内联生成');
    const buildFunctionName = 'build' + moduleName.charAt(0).toUpperCase() + moduleName.slice(1) + 'Content';
    if (typeof window[buildFunctionName] === 'function') {
      panelElement.innerHTML = window[buildFunctionName]();
      const initFuncName = initFunctionMap[moduleName];
      if (initFuncName && typeof window[initFuncName] === 'function') {
        window[initFuncName](subModule);
      }
      return;
    }
  }
  
  fetch(filePath)
    .then(response => {
      if (!response.ok) {
        throw new Error(`加载失败: ${response.status}`);
      }
      return response.text();
    })
    .then(html => {
      // 使用DOMParser解析HTML
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const bodyContent = doc.body.innerHTML;
      
      // 插入HTML内容
      panelElement.innerHTML = bodyContent;
      
      // <script>标签通过innerHTML插入时不会执行，需要手动执行
      const scripts = doc.querySelectorAll('script');
      scripts.forEach(script => {
        const newScript = document.createElement('script');
        if (script.src) {
          newScript.src = script.src;
        } else {
          newScript.textContent = script.textContent;
        }
        // 复制其他属性
        Array.from(script.attributes).forEach(attr => {
          newScript.setAttribute(attr.name, attr.value);
        });
        document.head.appendChild(newScript);
      });
      
      // 执行模块特定的初始化函数
      const initFuncName = initFunctionMap[moduleName];
      if (initFuncName && typeof window[initFuncName] === 'function') {
        window[initFuncName](subModule);
      }
    })
    .catch(error => {
      console.error('加载模块失败:', error);
      // 尝试使用内联生成函数作为后备
      const buildFunctionName = 'build' + moduleName.charAt(0).toUpperCase() + moduleName.slice(1) + 'Content';
      if (typeof window[buildFunctionName] === 'function') {
        console.log('使用内联生成函数:', buildFunctionName);
        panelElement.innerHTML = window[buildFunctionName]();
        // 执行模块特定的初始化函数
        const initFuncName = initFunctionMap[moduleName];
        if (initFuncName && typeof window[initFuncName] === 'function') {
          window[initFuncName](subModule);
        }
      } else {
        panelElement.innerHTML = `<div style="padding: 40px; text-align: center; color: #ff4d4f;">
          <h3>加载模块失败</h3>
          <p>${error.message}</p>
          <button class="btn btn-default" onclick="switchModule('${moduleName}')">重试</button>
        </div>`;
      }
    });
}

// 处理项目匹配点击
function handleProjectMatch(patientId, matchStatus) {
  console.log('项目匹配:', patientId, '状态:', matchStatus);
  
  // 判断是否正在匹配中
  if (matchStatus === '待匹配' || matchStatus === '匹配中') {
    // 显示提示：正在匹配中，请稍后点击
    showWechatToast('正在匹配中，请稍后点击');
  } else if (matchStatus === '已匹配') {
    // 显示确认框：确认匹配
    showProjectMatchConfirm(patientId);
  } else {
    // 默认显示确认框
    showProjectMatchConfirm(patientId);
  }
}

// 根据ID查找患者
function findPatientById(patientId) {
  for (const schemeNo in scPatientData) {
    const patients = scPatientData[schemeNo];
    const patient = patients.find(p => p.id === patientId);
    if (patient) return patient;
  }
  return null;
}

// 切换审核记录区域展开/收起
function toggleAuditSection(header) {
  const section = header.parentElement;
  const table = section.querySelector('.audit-table');
  const buttons = section.querySelectorAll('.audit-action-btn');
  const toggle = header.querySelector('.audit-section-toggle');
  
  if (table.style.display === 'none') {
    table.style.display = 'table';
    buttons.forEach(btn => btn.style.display = 'inline-flex');
    toggle.textContent = '^ 收起';
  } else {
    table.style.display = 'none';
    buttons.forEach(btn => btn.style.display = 'none');
    toggle.textContent = ' 展开';
  }
}

function toggleAdminGroup(key) {
  adminGroupState[key] = !adminGroupState[key];
  // Re-render sidebar preserving active item
  const sidebar = document.getElementById('leftSidebar');
  if (sidebar) {
    sidebar.innerHTML = buildAdminSidebar(window._adminActiveSub || 'projects');
    // Restore toggle button binding
    const btn = document.getElementById('sidebarToggleBtn');
    if (btn) btn.onclick = toggleSidebar;
  }
}

function toggleMatchSubMenu() {
  const isExpanded = matchSubMenuState.matchLog;
  
  // 如果当前有激活的子菜单项,则保持展开状态
  if (!isExpanded && !window._adminActiveSub) {
    // 首次点击,默认展开第一个
    matchSubMenuState.matchLog = true;
    matchSubMenuState.screenTableLog = true;
    matchSubMenuState.screenTableHistory = true;
  } else if (!isExpanded) {
    // 从收起展开
    matchSubMenuState.matchLog = true;
    matchSubMenuState.screenTableLog = true;
    matchSubMenuState.screenTableHistory = true;
  } else {
    // 从展开收起
    matchSubMenuState.matchLog = false;
    matchSubMenuState.screenTableLog = false;
    matchSubMenuState.screenTableHistory = false;
  }
  
  // Update submenu visibility
  const submenu = document.getElementById('matchSubMenu');
  if (submenu) {
    submenu.style.maxHeight = isExpanded ? '0' : '300px';
  }
  
  // 重新渲染侧边栏以更新箭头方向
  const sidebar = document.getElementById('leftSidebar');
  if (sidebar) {
    sidebar.innerHTML = buildAdminSidebar(window._adminActiveSub || 'projects');
    // Restore toggle button binding
    const btn = document.getElementById('sidebarToggleBtn');
    if (btn) btn.onclick = toggleSidebar;
  }
}

function renderWorkflowRows(filters) {
  let rows = _workflowData;
  if(filters) {
    const {name,ver,type,stage,status} = filters;
    if(name) rows = rows.filter(d => d.name.toLowerCase().includes(name.toLowerCase()));
    if(ver) rows = rows.filter(d => d.ver.toLowerCase().includes(ver.toLowerCase()));
    if(type) rows = rows.filter(d => d.type === type);
    if(stage) rows = rows.filter(d => d.stage === stage);
    if(status) rows = rows.filter(d => d.status === status);
  }
  const typeTag = {'预筛审核':'<span class="tag tag-blue">预筛审核</span>','主知情审核':'<span class="tag tag-orange">主知情审核</span>','导入审核':'<span class="tag tag-teal">导入审核</span>','入组审核':'<span class="tag tag-green">入组审核</span>'};
  return rows.map((d,i) => {
    const st = {published:'<span class="tag tag-green">● 已发布</span>',draft:'<span class="tag tag-yellow">● 草稿</span>',cancelled:'<span class="tag tag-gray">● 取消发布</span>'};
    const escName = d.name.replace(/'/g,"\\'");
    const acts = ['<a href="javascript:void(0)" onclick="viewWorkflowDetail(\''+d.ver+'\',\''+escName+'\')" class="table-action">流程设置</a>'];
    if(d.status==='draft') acts.push('<a href="javascript:void(0)" onclick="editWorkflow(\''+d.ver+'\')" class="table-action">编辑</a>');
    acts.push('<a href="javascript:void(0)" onclick="copyWorkflow(\''+d.ver+'\')" class="table-action">复制</a>');
    if(d.status==='published') acts.push('<a href="javascript:void(0)" onclick="unpublishWorkflow(\''+d.ver+'\')" class="table-action table-action-warn">取消发布</a>');
    acts.push(d.isDefault ? '<span class="tag tag-blue" style=\"font-size:11px\">默认</span>' : '<a href="javascript:void(0)" onclick="setDefaultWorkflow(\''+d.ver+'\')" class="table-action">设为默认</a>');
    if(d.status!=='published') acts.push('<a href="javascript:void(0)" onclick="deleteWorkflow(\''+d.ver+'\')" class="table-action table-action-danger">删除</a>');
    return '<tr><td>'+(i+1)+'</td><td><strong>'+d.ver+'</strong></td><td>'+d.name+'</td><td>'+(typeTag[d.type]||d.type)+'</td><td>'+st[d.status]+'</td><td>'+d.creator+'</td><td>'+d.updater+'</td><td>'+d.time+'</td><td style="white-space:nowrap">'+acts.join(' <span style="color:#e0e0e0">|</span> ')+'</td></tr>';
  }).join('');
}

  const filters = {
    name: document.getElementById('wfNameFilter').value.trim(),

    type: document.getElementById('wfTypeFilter').value,

function viewWorkflowDetail(ver,name) {
  // 从数据中找到当前审核流信息
  const d = _workflowData.find(item => item.ver === ver && item.name === name);
  const type = d ? d.type : '预筛审核';
  const stage = d ? d.stage : '知情前阶段';
  const scope = d ? (d.scope || '所有项目') : '所有项目';
  
  // 填充表单信息
  const fn = document.getElementById('flowInfoName');
  const fv = document.getElementById('flowInfoVer');
  const ft = document.getElementById('flowInfoType');
  const fs = document.getElementById('flowInfoStage');
  const fsc = document.getElementById('flowInfoScope');
  if(fn) fn.textContent = name;
  if(fv) fv.textContent = ver;
  if(ft) ft.textContent = type;
  if(fs) fs.textContent = stage;
  if(fsc) fsc.textContent = scope;
  
  // 设置标题
  const titleEl = document.getElementById('flowDesignerTitle');
  if(titleEl) titleEl.textContent = '审核流模板详情 - '+ver;
  
  // 存储当前查看的版本信息，供编辑时使用
  window._currentFlowVer = ver;
  window._currentFlowName = name;
  
  // 默认切换到流程设计Tab
  switchFlowTab('flow');
  
  // 重置缩放
  window._flowZoom = 100;
  document.getElementById('flowZoomLabel').textContent = '100%';
  document.getElementById('flowCanvas').style.transform = 'scale(1)';
  
  // 重置流程节点（清除之前添加的动态节点）
  resetFlowNodes();
  
  // 显示弹窗
  document.getElementById('flowDesignerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeFlowDesigner() {
  document.getElementById('flowDesignerModal').classList.remove('open');
  document.body.style.overflow = '';
}

function switchFlowTab(tab) {
  document.querySelectorAll('.flow-designer-tab').forEach(t => { t.classList.toggle('active', t.dataset.tab === tab); });
  const flowTab = document.getElementById('flowTabFlow');
  const formTab = document.getElementById('flowTabForm');
  if(tab === 'flow') {
    flowTab.style.display = 'flex';
    formTab.style.display = 'none';
  } else {
    flowTab.style.display = 'none';
    formTab.style.display = 'block';
  }
}

function zoomFlow(delta) {
  if(!window._flowZoom) window._flowZoom = 100;
  window._flowZoom = Math.max(50, Math.min(200, window._flowZoom + delta));
  document.getElementById('flowZoomLabel').textContent = window._flowZoom+'%';
  document.getElementById('flowCanvas').style.transform = 'scale('+(window._flowZoom/100)+')';
}

function highlightFlowNode(id) {
  const node = document.querySelector('[data-node="'+id+'"]');
  if(node) node.querySelector('.flow-node-box').style.boxShadow = '0 6px 20px rgba(22,119,255,0.3)';
}
function unhighlightFlowNode(id) {
  const node = document.querySelector('[data-node="'+id+'"]');
  if(node) node.querySelector('.flow-node-box').style.boxShadow = '0 2px 6px rgba(0,0,0,0.06)';
}

function addFlowNode() {
  const canvas = document.getElementById('flowCanvas');
  // 在添加按钮前插入新的审核节点
  const addBtn = canvas.querySelector('.flow-add-node');
  if(!addBtn) return;
  
  // 计算已有审核节点数量
  const existingNodes = canvas.querySelectorAll('.flow-node.approval-node');
  const nodeNum = existingNodes.length + 1;
  
  // 创建新审核节点
  const newArrow1 = document.createElement('div');
  newArrow1.className = 'flow-node-arrow';
  newArrow1.innerHTML = '<i class="fa-solid fa-arrow-right"></i>';
  
  const newNode = document.createElement('div');
  newNode.className = 'flow-node approval-node';
  newNode.innerHTML = '<div class="flow-node-box approval"><i class="fa-solid fa-user-check" style="margin-right:4px"></i>审核人'+nodeNum+'</div><div class="flow-node-label">审核节点</div>';
  
  const newArrow2 = document.createElement('div');
  newArrow2.className = 'flow-node-arrow';
  newArrow2.innerHTML = '<i class="fa-solid fa-arrow-right"></i>';
  
  // 在addBtn之前插入
  addBtn.before(newArrow2);
  addBtn.before(newNode);
  addBtn.before(newArrow1);
}

function resetFlowNodes() {
  const canvas = document.getElementById('flowCanvas');
  if(!canvas) return;
  const approvalNodes = canvas.querySelectorAll('.approval-node');
  approvalNodes.forEach(n => n.remove());
  // 也清理多余的箭头（保留原始的发起人→箭头→添加→箭头→结束结构）
  // 简单处理：移除所有动态添加的箭头（审核节点前后的箭头）
  const allArrows = canvas.querySelectorAll('.flow-node-arrow');
  // 保留前1个和后1个箭头
  if(allArrows.length > 2) {
    for(let i = 1; i < allArrows.length - 1; i++) {
      allArrows[i].remove();
    }
  }
}

function renderFlowTemplateRows(data) {
  const typeTag = {'预筛审核':'<span class="edit-tag edit-tag-blue">预筛审核</span>','主知情审核':'<span class="edit-tag edit-tag-orange">主知情审核</span>','导入审核':'<span class="edit-tag edit-tag-teal">导入审核</span>','入组审核':'<span class="edit-tag edit-tag-green">入组审核</span>'};
  return data.map((d,i) => {
    const statusBadge = d.status === 'enabled' ? '<span class="badge badge-success">● 已启用</span>' : '<span class="badge badge-gray">● 已停用</span>';
    // 将标签用容器包裹，支持自动换行
    const flowTypes = '<div style="display:flex;flex-wrap:wrap;gap:4px">'+d.flows.map(f => typeTag[f.auditType] || f.auditType).join('')+'</div>';
    const acts = [
      '<span class="action-link" onclick="viewFlowTemplateDetail('+d.id+')">查看详情</span>',
      '<span class="action-link" onclick="editFlowTemplate('+d.id+')">编辑</span>',
      d.status === 'enabled'
        ? '<span class="action-link warn" onclick="toggleFlowTemplateStatus('+d.id+')">停用</span>'
        : '<span class="action-link" onclick="toggleFlowTemplateStatus('+d.id+')">启用</span>',
      '<span class="action-link danger" onclick="deleteFlowTemplate('+d.id+')">删除</span>'
    ];
    return '<tr><td>'+(i+1)+'</td><td><strong>'+d.name+'</strong></td><td>'+flowTypes+'</td><td>'+statusBadge+'</td><td>'+d.creator+'</td><td>'+d.createTime+'</td><td style="white-space:nowrap">'+acts.join(' <span style="color:#e0e0e0">|</span> ')+'</td></tr>';
  }).join('');
}

function filterFlowTemplateTable() {
  const name = (document.getElementById('ftNameFilter')?.value || '').toLowerCase();
  const status = document.getElementById('ftStatusFilter')?.value || '';
  let filtered = _flowTemplateData.filter(d => {
    if(name && !d.name.toLowerCase().includes(name)) return false;
    if(status && d.status !== status) return false;
    return true;
  });
  document.getElementById('flowTemplateTableBody').innerHTML = renderFlowTemplateRows(filtered);
  document.getElementById('ftTotalCount').textContent = filtered.length;
}

// 新建/编辑弹窗
let _ftEditingId = null; // null=新建, number=编辑中
let _ftFlowItems = []; // 当前弹窗中的流程配置项

function openFlowTemplateForm(templateId) {
  _ftEditingId = templateId || null;
  _ftFlowItems = [];
  const modal = document.getElementById('flowTemplateFormModal');
  const title = document.getElementById('flowTemplateFormTitle');
  if(!modal) return;
  if(templateId) {
    const d = _flowTemplateData.find(t => t.id === templateId);
    if(!d) return;
    title.textContent = '编辑流程模板';
    document.getElementById('ftName').value = d.name;
    document.getElementById('ftDesc').value = d.desc;
    _ftFlowItems = JSON.parse(JSON.stringify(d.flows));
  } else {
    title.textContent = '新建流程模板';
    document.getElementById('ftName').value = '';
    document.getElementById('ftDesc').value = '';
    _ftFlowItems = [];
  }
  renderFlowTemplateFormItems();
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeFlowTemplateForm() {
  const modal = document.getElementById('flowTemplateFormModal');
  if(modal) modal.style.display = 'none';
  document.body.style.overflow = '';
  _ftEditingId = null;
  _ftFlowItems = [];
}

function editFlowTemplate(id) { openFlowTemplateForm(id); }

function renderFlowTemplateFormItems() {
  const container = document.getElementById('ftFlowList');
  if(!container) return;
  if(_ftFlowItems.length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:#bbb;border:1px dashed #d9d9d9;border-radius:6px;font-size:13px">暂无流程配置，请点击下方"添加审核流程"按钮</div>';
    return;
  }
  // 获取所有已发布的审核流
  const publishedFlows = _workflowData.filter(w => w.status === 'published');
  container.innerHTML = _ftFlowItems.map((item, idx) => {
    // 显示所有已发布的审核流，不根据审核类型过滤
    const flowOptions = publishedFlows.map(w => '<option value="'+w.ver+'|'+w.name+'|'+w.type+'"'+(item.workflowVer===w.ver && item.workflowName===w.name?' selected':'')+'>'+w.ver+' - '+w.name+'</option>').join('');
    const canUp = idx > 0;
    const canDown = idx < _ftFlowItems.length - 1;
    return '<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;padding:10px 12px;background:#fafbfc;border:1px solid #e8e8e8;border-radius:6px">' +
      '<span style="font-size:13px;color:#1677ff;font-weight:600;min-width:24px;text-align:center">'+(idx+1)+'</span>' +
      '<input type="text" class="form-input" style="width:140px;flex-shrink:0" placeholder="请输入审核名称" value="'+(item.auditType||'')+'" onblur="updateFlowItemAuditType('+idx+',this.value)"/>' +
      '<select class="form-select" style="flex:1;min-width:0" onchange="updateFlowItemWorkflow('+idx+',this.value)"><option value="">请选择审核流</option>'+flowOptions+'</select>' +
      (item.workflowVer ? '<button class="btn btn-outline btn-sm" style="padding:4px 10px;font-size:12px;flex-shrink:0" onclick="viewFlowDetail('+idx+')"><i class="fa-solid fa-eye"></i> 查看流程</button>' : '') +
      '<button class="btn btn-outline btn-sm" style="padding:3px 7px;font-size:12px;flex-shrink:0;'+(canUp?'':'opacity:0.3;cursor:not-allowed')+'" onclick="'+(canUp?'moveFlowTemplateFlowItem('+idx+',-1)':'')+'" title="上移"'+(canUp?'':' disabled')+'><i class="fa-solid fa-arrow-up"></i></button>' +
      '<button class="btn btn-outline btn-sm" style="padding:3px 7px;font-size:12px;flex-shrink:0;'+(canDown?'':'opacity:0.3;cursor:not-allowed')+'" onclick="'+(canDown?'moveFlowTemplateFlowItem('+idx+',1)':'')+'" title="下移"'+(canDown?'':' disabled')+'><i class="fa-solid fa-arrow-down"></i></button>' +
      '<span style="cursor:pointer;color:#ff4d4f;font-size:16px;flex-shrink:0" onclick="removeFlowTemplateFlowItem('+idx+')" title="删除"><i class="fa-solid fa-trash-can"></i></span>' +
      '</div>';
  }).join('');
}

function addFlowTemplateFlowItem() {
  // 添加一个空的流程配置项，让用户手动输入审核类型
  _ftFlowItems.push({ auditType: '', workflowVer:'', workflowName:'' });
  renderFlowTemplateFormItems();
}

function removeFlowTemplateFlowItem(idx) {
  _ftFlowItems.splice(idx, 1);
  renderFlowTemplateFormItems();
}

function moveFlowTemplateFlowItem(idx, direction) {
  const targetIdx = idx + direction;
  if(targetIdx < 0 || targetIdx >= _ftFlowItems.length) return;
  const temp = _ftFlowItems[idx];
  _ftFlowItems[idx] = _ftFlowItems[targetIdx];
  _ftFlowItems[targetIdx] = temp;
  renderFlowTemplateFormItems();
}

function updateFlowItemAuditType(idx, val) {
  if(_ftFlowItems[idx]) {
    _ftFlowItems[idx].auditType = val;
    _ftFlowItems[idx].workflowVer = '';
    _ftFlowItems[idx].workflowName = '';
    renderFlowTemplateFormItems();
  }
}

function updateFlowItemWorkflow(idx, val) {
  if(_ftFlowItems[idx] && val) {
    const parts = val.split('|');
    _ftFlowItems[idx].workflowVer = parts[0];
    _ftFlowItems[idx].workflowName = parts[1] || '';
    // 自动填充审核流的审核类型到左侧输入框
    if(parts[2] && !_ftFlowItems[idx].auditType) {
      _ftFlowItems[idx].auditType = parts[2];
      renderFlowTemplateFormItems();
    }
  }
}

// 查看审核流详情（在流程模板配置中）
function viewFlowDetail(idx) {
  const item = _ftFlowItems[idx];
  if(!item || !item.workflowVer) return;
  // 调用现有的查看流程函数
  viewAuditProcess(item.workflowVer, item.workflowName);
}

function saveFlowTemplate() {
  const name = document.getElementById('ftName')?.value?.trim();
  const desc = document.getElementById('ftDesc')?.value?.trim() || '';
  if(!name) { alert('请输入模板名称'); return; }
  if(_ftFlowItems.length === 0) { alert('请至少添加一个审核流程'); return; }
  // 检查是否每个流程都填写了审核类型并选择了审核流
  for(let i=0; i<_ftFlowItems.length; i++) {
    if(!_ftFlowItems[i].auditType) { alert('第'+(i+1)+'个流程尚未填写审核类型'); return; }
    if(!_ftFlowItems[i].workflowVer) { alert('第'+(i+1)+'个流程尚未选择审核流'); return; }
  }

  if(_ftEditingId) {
    // 编辑
    const d = _flowTemplateData.find(t => t.id === _ftEditingId);
    if(d) {
      d.name = name;
      d.desc = desc;
      d.flows = JSON.parse(JSON.stringify(_ftFlowItems));
    }
    alert('模板已更新！');
  } else {
    // 新建
    _flowTemplateData.push({
      id: _flowTemplateNextId++,
      name: name,
      desc: desc,
      status: 'enabled',
      creator: '当前用户',
      createTime: new Date().toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/\//g,'-'),
      flows: JSON.parse(JSON.stringify(_ftFlowItems))
    });
    alert('模板已创建！');
  }
  closeFlowTemplateForm();
  // 刷新列表
  const tbody = document.getElementById('flowTemplateTableBody');
  if(tbody) {
    tbody.innerHTML = renderFlowTemplateRows(_flowTemplateData);
    document.getElementById('ftTotalCount').textContent = _flowTemplateData.length;
  }
}

function toggleFlowTemplateStatus(id) {
  const d = _flowTemplateData.find(t => t.id === id);
  if(!d) return;
  const action = d.status === 'enabled' ? '停用' : '启用';
  if(confirm('确定要'+action+'模板「'+d.name+'」吗？')) {
    d.status = d.status === 'enabled' ? 'disabled' : 'enabled';
    const tbody = document.getElementById('flowTemplateTableBody');
    if(tbody) tbody.innerHTML = renderFlowTemplateRows(_flowTemplateData);
  }
}

function deleteFlowTemplate(id) {
  const d = _flowTemplateData.find(t => t.id === id);
  if(!d) return;
  if(confirm('确定要删除模板「'+d.name+'」吗？\\n删除后不可恢复。')) {
    _flowTemplateData = _flowTemplateData.filter(t => t.id !== id);
    const tbody = document.getElementById('flowTemplateTableBody');
    if(tbody) {
      tbody.innerHTML = renderFlowTemplateRows(_flowTemplateData);
      document.getElementById('ftTotalCount').textContent = _flowTemplateData.length;
    }
  }
}

function selectTenant(element, tenantId) {
  // 清除所有选中状态
  const allNodes = document.querySelectorAll('.tenant-tree-node');
  allNodes.forEach(node => {
    node.classList.remove('active-tenant');
  });
  
  // 设置当前选中状态
  element.classList.add('active-tenant');
  
  // 获取租户名称
  const tenantNameElement = element.querySelector('span:last-child') || element;
  const tenantName = tenantNameElement.textContent.trim();
  
  // 渲染详情
  renderTenantDetail(tenantId, tenantName);
}

function toggleDeptTreeDropdown() {
  const panel = document.getElementById('deptDropdownPanel');
  const trigger = document.getElementById('deptSelectTrigger');
  const arrow = trigger.querySelector('span:last-child');
  const display = document.getElementById('deptSelectDisplay');
  
  if (panel.style.display === 'none' || !panel.style.display) {
    panel.style.display = 'block';
    if (arrow) arrow.style.transform = 'rotate(180deg)';
    window._deptDropdownOpen = true;
    if (display.textContent === '请选择') {
      display.style.color = '#000';
    }
  } else {
    panel.style.display = 'none';
    if (arrow) arrow.style.transform = 'rotate(0deg)';
    window._deptDropdownOpen = false;
  }
}

function toggleDeptTreeNode(element) {
  const arrow = element.querySelector('span:first-child');
  const parent = element.parentElement;
  const children = parent.querySelector('.dept-tree-children');
  
  if (arrow && children) {
    const isExpanded = children.style.maxHeight && children.style.maxHeight !== '0px';
    
    if (isExpanded) {
      children.style.maxHeight = '0px';
      children.style.opacity = '0';
      arrow.style.transform = 'rotate(0deg)';
    } else {
      children.style.maxHeight = children.scrollHeight + 'px';
      children.style.opacity = '1';
      arrow.style.transform = 'rotate(90deg)';
    }
  }
}

function selectDeptFromDropdown(value) {
  const display = document.getElementById('deptSelectDisplay');
  const panel = document.getElementById('deptDropdownPanel');
  const trigger = document.getElementById('deptSelectTrigger');
  const arrow = trigger.querySelector('span:last-child');
  
  if (value) {
    display.textContent = value;
    display.style.color = '#000';
  } else {
    display.textContent = '请选择';
    display.style.color = '#999';
  }
  
  panel.style.display = 'none';
  if (arrow) arrow.style.transform = 'rotate(0deg)';
  window._deptDropdownOpen = false;
}

function filterDeptTree(keyword) {
  const nodes = document.querySelectorAll('#deptTreeContainer > div');
  
  if (!keyword) {
    // 显示所有节点
    nodes.forEach(node => {
      node.style.display = 'block';
      const children = node.querySelector('.dept-tree-children');
      if (children) {
        children.style.maxHeight = children.scrollHeight + 'px';
        children.style.opacity = '1';
        const arrow = node.querySelector('span:first-child');
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }
    });
    return;
  }
  
  // 根据关键词过滤
  nodes.forEach(node => {
    const nodeText = node.textContent.toLowerCase();
    if (nodeText.includes(keyword.toLowerCase())) {
      node.style.display = 'block';
      // 展开匹配的节点
      const children = node.querySelector('.dept-tree-children');
      if (children) {
        children.style.maxHeight = children.scrollHeight + 'px';
        children.style.opacity = '1';
        const arrow = node.querySelector('span:first-child');
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }
    } else {
      node.style.display = 'none';
    }
  });
}

// 点击外部关闭下拉框
document.addEventListener('click', function(e) {
  const trigger = document.getElementById('deptSelectTrigger');
  const panel = document.getElementById('deptDropdownPanel');
  if (trigger && panel && !trigger.contains(e.target) && !panel.contains(e.target)) {
    panel.style.display = 'none';
    const arrow = trigger.querySelector('span:last-child');
    if (arrow) arrow.style.transform = 'rotate(0deg)';
    window._deptDropdownOpen = false;
  }
});

function toggleNewDeptTreeDropdown() {
  const panel = document.getElementById('newDeptDropdownPanel');
  const trigger = document.getElementById('newDeptSelectTrigger');
  const arrow = document.getElementById('newDeptSelectArrow');
  const display = document.getElementById('newDeptSelectDisplay');
  
  if (panel.style.display === 'none' || !panel.style.display) {
    panel.style.display = 'block';
    if (arrow) arrow.style.transform = 'rotate(180deg)';
    window._newDeptDropdownOpen = true;
    if (display.textContent === '请选择') {
      display.style.color = '#000';
    }
  } else {
    panel.style.display = 'none';
    if (arrow) arrow.style.transform = 'rotate(0deg)';
    window._newDeptDropdownOpen = false;
  }
}

function toggleNewDeptTreeNode(element) {
  const arrow = element.querySelector('span:first-child');
  const parent = element.parentElement;
  const children = parent.querySelector('.new-dept-tree-children');
  
  if (arrow && children) {
    const isExpanded = children.style.maxHeight && children.style.maxHeight !== '0px';
    
    if (isExpanded) {
      children.style.maxHeight = '0px';
      children.style.opacity = '0';
      arrow.style.transform = 'rotate(0deg)';
    } else {
      children.style.maxHeight = children.scrollHeight + 'px';
      children.style.opacity = '1';
      arrow.style.transform = 'rotate(90deg)';
    }
  }
}

function selectNewDeptFromDropdown(value) {
  const display = document.getElementById('newDeptSelectDisplay');
  const panel = document.getElementById('newDeptDropdownPanel');
  const arrow = document.getElementById('newDeptSelectArrow');
  
  if (value) {
    display.textContent = value;
    display.style.color = '#000';
  } else {
    display.textContent = '请选择';
    display.style.color = '#999';
  }
  
  panel.style.display = 'none';
  if (arrow) arrow.style.transform = 'rotate(0deg)';
  window._newDeptDropdownOpen = false;
}

function filterNewDeptTree(keyword) {
  const nodes = document.querySelectorAll('#newDeptTreeContainer > div');
  
  if (!keyword) {
    nodes.forEach(node => {
      node.style.display = 'block';
      const children = node.querySelector('.new-dept-tree-children');
      if (children) {
        children.style.maxHeight = children.scrollHeight + 'px';
        children.style.opacity = '1';
        const arrow = node.querySelector('span:first-child');
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }
    });
    return;
  }
  
  nodes.forEach(node => {
    const nodeText = node.textContent.toLowerCase();
    if (nodeText.includes(keyword.toLowerCase())) {
      node.style.display = 'block';
      const children = node.querySelector('.new-dept-tree-children');
      if (children) {
        children.style.maxHeight = children.scrollHeight + 'px';
        children.style.opacity = '1';
        const arrow = node.querySelector('span:first-child');
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }
    } else {
      node.style.display = 'none';
    }
  });
}

function buildDeptTreeNodes(nodes, pathPrefix) {
  return nodes.map(node => {
    const fullPath = pathPrefix ? pathPrefix + '/' + node.name : node.name;
    const hasChildren = node.children && node.children.length > 0;
    let arrowHTML = '';
    if (hasChildren) {
      arrowHTML = `<span class="modal-tree-arrow" style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;transition:transform 0.3s ease;font-size:12px;color:#999;cursor:pointer" onclick="toggleModalTree(this)">▶</span>`;
    } else {
      arrowHTML = `<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;font-size:12px;color:#d9d9d9"> </span>`;
    }
    let childrenHTML = '';
    if (hasChildren) {
      childrenHTML = `<div class="tree-children animated" style="max-height:0;opacity:0;margin-left:22px">${buildDeptTreeNodes(node.children, fullPath)}</div>`;
    }
    return `<div style="margin-bottom:2px">
      <label style="display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;cursor:pointer;font-size:13px;color:#333;transition:background 0.2s" onmouseover="this.style.background='#e8f0fe'" onmouseout="this.style.background='transparent'" onclick="selectDeptNode('${fullPath}', this)">
        ${arrowHTML}
        <span style="margin-left:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">${node.name}</span>
      </label>
      ${childrenHTML}
    </div>`;
  }).join('');
}

function buildDeptSelectOptions() {
  return deptTreeData.map(tenant => {
    let childrenHTML = tenant.children.map(child => {
      const fullPath = tenant.name + '/' + child.name;
      return `<option value="${fullPath}">${fullPath}</option>`;
    }).join('');
    
    if (tenant.children.some(c => c.children && c.children.length > 0)) {
      let subChildrenHTML = '';
      tenant.children.forEach(c => {
        if (c.children && c.children.length > 0) {
          subChildrenHTML += `<optgroup label="${c.name}">`;
          c.children.forEach(sub => {
            subChildrenHTML += `<option value="${tenant.name}/${c.name}/${sub.name}">${tenant.name}/${c.name}/${sub.name}</option>`;
          });
          subChildrenHTML += `</optgroup>`;
        }
      });
      return `<optgroup label="${tenant.name}">${childrenHTML}${subChildrenHTML}</optgroup>`;
    }
    return `<optgroup label="${tenant.name}">${childrenHTML}</optgroup>`;
  }).join('');
}

function selectDeptNode(fullPath, labelEl) {

  const allLabels = document.querySelectorAll('#deptTreeContainer label');

  const dd = document.getElementById('deptSelectDropdown');
  if(dd) dd.style.display = 'none';
}

function saveDept() {

    return;

  alert((deptEditIndex >= 0 ? '部门信息已更新' : '部门创建成功') + '！');
  closeDeptModal();
}

function closeUserModal() {
  const m = document.getElementById('userModal');
  if(m) m.remove();
}

function saveUser() {
  const name = document.getElementById('modalName').value.trim();
  const phone = document.getElementById('modalPhone').value.trim();
  if(!name) { alert('请输入姓名'); return; }
  if(!phone) { alert('请输入手机号'); return; }

  // 获取选中部门
  const checkboxes = document.querySelectorAll('.dept-checkbox:checked');
  const depts = Array.from(checkboxes).map(cb => cb.value);

  const newUser = {
    userId: document.getElementById('modalUserId').value.trim(),
    name,
    phone,
    domain: document.getElementById('modalDomain').value.trim(),
    employeeId: document.getElementById('modalEmployeeId').value.trim(),
    email: document.getElementById('modalEmail').value.trim(),
    working: document.getElementById('modalWorking').value,
    joinDate: document.getElementById('modalJoinDate').value,
    leaveDate: document.getElementById('modalLeaveDate').value,
    userType: document.getElementById('modalUserType').value,
    dept: depts.length > 0 ? depts.join(', ') : '未分配',
    depts,
    role: document.querySelector('input[name="user-role"]:checked')?.value || '',
    supplier: document.getElementById('modalSupplier').value,
    status: '内部用户',
  };

  if(userEditIndex >= 0) {
    users[userEditIndex] = newUser;
    alert('用户信息已更新！');
  } else {
    users.push(newUser);
    alert('新用户添加成功！');
  }

  closeUserModal();
  // 刷新表格
  const mainPanel = document.getElementById('mainPanel');
  if(mainPanel) mainPanel.innerHTML = buildAdminContent('users');
}

function badgeHtml(status) {
  const map = {
    '待审核':'<span class="badge badge-warning">待审核</span>',
    '审核中':'<span class="badge badge-blue">审核中</span>',
    '通过':'<span class="badge badge-success">通过</span>',
    '拒绝':'<span class="badge badge-error">拒绝</span>',
    '有效':'<span class="badge badge-success">有效</span>',
    '已满':'<span class="badge badge-error">已满</span>',
    '已过期':'<span class="badge badge-gray">已过期</span>',
  };
  return map[status] || `<span class="badge badge-gray">${status}</span>`;
}
function matchBadge(m) {
  if(m==='高匹配') return '<span class="badge badge-success">高匹配</span>';
  if(m==='中匹配') return '<span class="badge badge-warning">中匹配</span>';
  return '<span class="badge badge-error">低匹配</span>';
}
function recoBadge(r) {
  if(r==='强烈推荐') return '<span class="badge badge-success">强烈推荐</span>';
  if(r==='建议评估') return '<span class="badge badge-warning">建议评估</span>';
  return '<span class="badge badge-error">不推荐</span>';
}
function projStatusBadge(s) {
  const m = {'进行中':'badge-blue','招募中':'badge-success','已完成':'badge-gray','暂停':'badge-warning'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;
}
function testStatusBadge(s) {
  if(s==='通过') return '<span class="badge badge-success">✓ 通过</span>';
  if(s==='失败') return '<span class="badge badge-error">✗ 失败</span>';
  return '<span class="badge badge-gray">— 跳过</span>';
}

function updateAIScheduleDisplay() {

function updateScheduleDay(day) {
  aiImproveState.scheduleDay = parseInt(day);
  const weekDays = ['','一','二','三','四','五','六','日'];
  // 更新 nextRun 显示
  const today = new Date();
  const dayOfWeek = today.getDay() || 7; // Sunday=7
  const targetDay = parseInt(day);
  let daysUntil = targetDay - dayOfWeek;
  if(daysUntil <= 0) daysUntil += 7;
  const nextDate = new Date(today);
  nextDate.setDate(today.getDate() + daysUntil);
  const dateStr = nextDate.getFullYear()+'-'+String(nextDate.getMonth()+1).padStart(2,'0')+'-'+String(nextDate.getDate()).padStart(2,'0');
  aiImproveState.nextRun = dateStr + ' ' + aiImproveState.scheduleTime;
  switchModule('aiimprove', 'settings');
}

function updateScheduleTime(time) {
  aiImproveState.scheduleTime = time;
  const parts = aiImproveState.nextRun.split(' ');
  aiImproveState.nextRun = parts[0] + ' ' + time;
  switchModule('aiimprove', 'settings');
}

function runManualAnalysis() {
  const sel = document.getElementById('manualProjectSelect');
  if(!sel.value) { alert('请先选择项目'); return; }
  
  const isAll = sel.value === '__ALL__';
  aiImproveState.isRunning = true;
  aiImproveState.currentProject = isAll ? '全部' : sel.value;
  switchModule('aiimprove', 'settings');
  
  const totalProjects = isAll ? aiReportProjects.length : 1;
  const totalCases = isAll ? aiReportProjects.reduce((s,p)=>s+p.cases,0) : (aiReportProjects.find(p=>p.id===sel.value)?.cases||0);
  const duration = isAll ? `${Math.floor(Math.random()*3+3)}分${Math.floor(Math.random()*50+10)}秒` : `${Math.floor(Math.random()*40+20)}秒`;
  
  // 模拟2-3秒后完成
  setTimeout(() => {
    aiImproveState.isRunning = false;
    const projectLabel = isAll ? '全部项目' : sel.value;
    execLogsData.unshift({
      id: execLogsData.length+1,
      time: new Date().toLocaleString('zh-CN',{hour12:false}),
      type:'手动',
      projects: totalProjects,
      totalCases: totalCases,
      duration: duration,
      status:'成功',
      project: isAll ? null : sel.value
    });
    if(execLogsData.length > 20) execLogsData.pop();
    switchModule('aiimprove', 'settings');
    alert(`分析完成！已分析 ${totalProjects} 个项目，共 ${totalCases} 例患者数据`);
  }, 2000);
}

function resetAILogFilters() {
  const startEl = document.getElementById('logDateStart');
  const endEl = document.getElementById('logDateEnd');
  const typeEl = document.getElementById('logTypeQry');
  const statusEl = document.getElementById('logStatusQry');
  if(startEl) startEl.value = '';
  if(endEl) endEl.value = '';
  if(typeEl) typeEl.value = '';
  if(statusEl) statusEl.value = '';
  renderAILogs();
}

function clearAILogs() {
  if(!confirm('确认清空所有执行日志？此操作不可恢复。')) return;
  execLogsData.length = 0;
  renderAILogs();
}

function renderAILogs() {
  const dateStart = document.getElementById('logDateStart')?.value || '';
  const dateEnd = document.getElementById('logDateEnd')?.value || '';
  const typeQry = document.getElementById('logTypeQry')?.value || '';
  const statusQry = document.getElementById('logStatusQry')?.value || '';
  
  let filtered = [...execLogsData];
  
  if(typeQry) filtered = filtered.filter(l=>l.type===typeQry);
  if(statusQry) filtered = filtered.filter(l=>l.status===statusQry);
  if(dateStart) filtered = filtered.filter(l=>l.time.substring(0,10) >= dateStart);
  if(dateEnd) filtered = filtered.filter(l=>l.time.substring(0,10) <= dateEnd);
  
  const el = document.getElementById('aiLogTable');
  if(!el) return;
  
  el.innerHTML = `
    <table class="proj-table">
      <thead>
        <tr>
          <th style="width:60px">序号</th>
          <th style="min-width:160px">执行时间</th>

          <th style="min-width:140px">分析项目</th>
          <th style="width:80px">覆盖项目数</th>

          <th style="width:80px">耗时</th>

          <td style="font-size:12.5px;color:#333">${log.project||'全部项目'}</td>

function renderAIReports() {
  const projId = (document.getElementById('reportProjId')?.value || '').trim().toLowerCase();
  const planNo = (document.getElementById('reportPlanNo')?.value || '').trim().toLowerCase();
  const projName = (document.getElementById('reportProjName')?.value || '').trim().toLowerCase();
  
  let filtered = [...aiReportProjects];
  if(projId) filtered = filtered.filter(p=>p.id.toLowerCase().includes(projId));
  if(planNo) filtered = filtered.filter(p=>p.planNo.toLowerCase().includes(planNo));
  if(projName) filtered = filtered.filter(p=>p.name.toLowerCase().includes(projName));
  
  // 如果有点TABLE头排序，优先使用表头排序
  if(aiImproveState.sortField) {
    const sortField = aiImproveState.sortField;
    const sortDesc = aiImproveState.sortOrder === 'desc';
    
    filtered.sort((a,b)=>{
      const va = a[sortField] || 0;
      const vb = b[sortField] || 0;
      return sortDesc ? vb - va : va - vb;
    });
  }
  
  // 更新表头排序图标
  updateSortIcons();
  
  // Update summary bar
  const totalEl = document.getElementById('aiReportTotal');
  const avgEl = document.getElementById('aiReportAvgAcc');
  const maxEl = document.getElementById('aiReportMaxCount');
  const minEl = document.getElementById('aiReportMinCount');
  
  if(totalEl) totalEl.textContent = filtered.length;
  if(avgEl) {
    const avg = filtered.length ? (filtered.reduce((s,p)=>s+p.aiAccuracy,0)/filtered.length).toFixed(1) : 0;
    avgEl.textContent = avg + '%';
  }
  if(maxEl) {
    const max = filtered.length ? Math.max(...filtered.map(p=>p.aiAccuracy)) : 0;
    maxEl.textContent = filtered.filter(p=>p.aiAccuracy===max).length;
  }
  if(minEl) {
    const min = filtered.length ? Math.min(...filtered.map(p=>p.aiAccuracy)) : 0;
    minEl.textContent = filtered.filter(p=>p.aiAccuracy===min).length;
  }
  
  // Re-render list
  const listEl = document.getElementById('aiReportList');
  if(listEl) listEl.innerHTML = renderAIReportList(filtered);
}

function resetAIReportFilters() {
  const projIdEl = document.getElementById('reportProjId');
  const planNoEl = document.getElementById('reportPlanNo');
  const projNameEl = document.getElementById('reportProjName');
  if(projIdEl) projIdEl.value = '';
  if(planNoEl) planNoEl.value = '';
  if(projNameEl) projNameEl.value = '';
  // 重置排序状态
  aiImproveState.sortField = null;
  aiImproveState.sortOrder = 'desc';
  renderAIReports();
}

// 切换表头排序
function toggleSort(field) {
  // 如果点击的是同一个字段，切换升降序
  if(aiImproveState.sortField === field) {
    aiImproveState.sortOrder = aiImproveState.sortOrder === 'desc' ? 'asc' : 'desc';
  } else {
    // 如果是新字段，默认降序
    aiImproveState.sortField = field;
    aiImproveState.sortOrder = 'desc';
  }
  renderAIReports();
}

// 更新排序图标显示
function updateSortIcons() {
  const iconAcc = document.getElementById('sortIconAiAccuracy');
  const iconPass = document.getElementById('sortIconPassRate');
  
  // 默认显示明显的上下箭头,表示可排序
  if(iconAcc) {
    iconAcc.innerHTML = '<span style="color:#666;font-size:14px;margin-left:2px">⇅</span>';
  }
  if(iconPass) {
    iconPass.innerHTML = '<span style="color:#666;font-size:14px;margin-left:2px">⇅</span>';
  }
  
  // 如果设置了排序,高亮当前排序的列
  if(aiImproveState.sortField) {
    const activeIcon = aiImproveState.sortField === 'aiAccuracy' ? iconAcc : iconPass;
    const inactiveIcon = aiImproveState.sortField === 'aiAccuracy' ? iconPass : iconAcc;
    
    if(activeIcon) {
      // 当前排序的列显示蓝色大箭头
      const arrow = aiImproveState.sortOrder === 'desc' 
        ? '<span style="color:#1677ff;font-size:16px;margin-left:2px;font-weight:bold">↓</span>' 
        : '<span style="color:#1677ff;font-size:16px;margin-left:2px;font-weight:bold">↑</span>';
      activeIcon.innerHTML = arrow;
    }
    if(inactiveIcon) {
      // 非当前排序的列保持灰色双箭头
      inactiveIcon.innerHTML = '<span style="color:#666;font-size:14px;margin-left:2px">⇅</span>';
    }
  }
}

function viewAIReportDetail(projectId) {
  aiImproveState.currentProject = projectId;
  
  // 初始化趋势图数据
  if (!aiImproveState.trendData) {
    aiImproveState.trendData = generateTrendData(projectId, '7d');

  if (!aiImproveState.trendRange) {
    aiImproveState.trendRange = '7d';
  }
  
  switchModule('aiimprove', 'report-detail');

function switchReportStep(pid, stepNum) {
  // 切换步骤条激活状态
  const step1 = document.getElementById('reportStep1-' + pid);
  const step2 = document.getElementById('reportStep2-' + pid);
  const panel1 = document.getElementById('reportPanel1-' + pid);
  const panel2 = document.getElementById('reportPanel2-' + pid);
  if (!step1 || !step2 || !panel1 || !panel2) return;

  if (stepNum === 1) {
    step1.className = 'report-step-item active';
    step2.className = 'report-step-item';
    panel1.className = 'report-step-panel active';
    panel2.className = 'report-step-panel';
    // 更新圆圈图标
    step1.querySelector('.report-step-circle').textContent = '1';
    step2.querySelector('.report-step-circle').textContent = '2';
  } else {
    step1.className = 'report-step-item done';
    step2.className = 'report-step-item active';
    panel1.className = 'report-step-panel';
    panel2.className = 'report-step-panel active';
    // 第一步标记为已完成（✓）
    step1.querySelector('.report-step-circle').textContent = '✓';
    step2.querySelector('.report-step-circle').textContent = '2';
    // 滚动到顶部
    const mainContent = document.getElementById('mainPanel');
    if (mainContent) mainContent.scrollTop = 0;
  }
}

// ===== AI报告详情页内嵌函数 =====

function switchPhaseTab(phase, el) {
  document.querySelectorAll('.phase-tab').forEach(tab => {
    tab.classList.remove('active');
  });
  el.classList.add('active');
  
  document.querySelectorAll('.phase-content').forEach(content => {
    content.style.display = 'none';
  });
  const target = document.getElementById('phase-' + phase);
  if (target) {
    target.style.display = 'block';
  }
}

function togglePhase(btn, phase) {
  document.querySelectorAll('.simple-phase-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  console.log('已选择阶段:', phase);
}

function toggleImprovement(id) {
  const imp = editableImprovements.find(i => i.id === id);
  if (imp) {
    imp.enabled = !imp.enabled;
    console.log('改进建议', id, imp.enabled ? '已启用' : '已禁用');
  }
}

function togglePhaseForItem(id, phase, el) {
  const imp = editableImprovements.find(i => i.id === id);
  if (!imp) return;
  
  imp.phases[phase] = !imp.phases[phase];
  
  // 更新UI
  const isActive = imp.phases[phase];
  el.style.borderColor = isActive ? '#1677ff' : '#d9d9d9';
  el.style.background = isActive ? '#e6f4ff' : '#fff';
  const label = el.querySelector('div:nth-child(2)');
  if (label) {
    label.style.fontWeight = isActive ? '600' : '400';
    label.style.color = isActive ? '#1677ff' : '#666';
  }
  const statusDiv = el.querySelector('div:nth-child(3)');
  if (isActive && !statusDiv) {
    el.insertAdjacentHTML('beforeend', '<div style="font-size:11px;color:#1677ff;margin-top:2px">已启用</div>');
  } else if (!isActive && statusDiv) {
    statusDiv.remove();
  }
  
  console.log('改进建议', id, '阶段', phase, imp.phases[phase] ? '已启用' : '已禁用');
  showSaveToast();
}

function saveImprovement(id) {
  // 保存时获取textarea的最新值
  const card = document.querySelector(`.improve-card[data-id="${id}"]`);
  if (!card) return;
  
  const improvement = card.querySelector('[data-field="improvement"]')?.value;
  const prompt = card.querySelector('[data-field="prompt"]')?.value;
  
  const imp = editableImprovements.find(i => i.id === id);
  if (imp) {
    if (improvement) imp.improvement = improvement;
    if (prompt) imp.prompt = prompt;
  }
  
  showSaveToast();
}

function copyPrompt(id) {
  const imp = editableImprovements.find(i => i.id === id);
  if (!imp) return;
  
  // 复制到剪贴板
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(imp.prompt).then(() => {
      showSaveToast('提示词已复制到剪贴板！');
    }).catch(() => {
      fallbackCopy(imp.prompt);
    });
  } else {
    fallbackCopy(imp.prompt);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showSaveToast('提示词已复制到剪贴板！');
  } catch (e) {
    alert('复制失败，请手动复制');
  }
  document.body.removeChild(textarea);
}

function showSaveToast(msg) {
  const toast = document.getElementById('saveToast');
  if (toast) {
    if (msg) {
      toast.innerHTML = '✅ ' + msg;
    } else {
      toast.innerHTML = '✅ 保存成功！';
    }
    toast.style.display = 'block';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 2000);
  }
}

function applyImprovements() {
  const enabledCount = editableImprovements.filter(i => i.enabled).length;
  const totalPhases = editableImprovements.reduce((sum, i) => 
    sum + (i.phases.prescreen ? 1 : 0) + (i.phases.enrolling ? 1 : 0), 0);
  
  alert(
    `✅ 改进方案已应用！\n\n` +
    `已启用 ${enabledCount} 条改进建议\n` +
    `共应用到 ${totalPhases} 个阶段\n` +
    `预计可减少AI误判约 ${aiOverReject} 例`
  );
  switchModule('aiimprove', 'reports');
}

// 生成模拟趋势数据
function generateTrendData(projectId, range) {
  const proj = aiReportProjects.find(p => p.id === projectId) || aiReportProjects[0];
  const days = range === '7d' ? 7 : range === '30d' ? 30 : 14; // 默认14天
  const data = [];
  
  // 基于当前准确率生成合理的历史数据
  const baseAccuracy = proj.aiAccuracy;
  
  for (let i = days - 1; i >= 0; i--) {
    const date = new Date();
    date.setDate(date.getDate() - i);
    
    // 模拟准确率波动（在基础值上下浮动）
    const fluctuation = (Math.random() - 0.5) * 10;
    const accuracy = Math.min(99, Math.max(50, baseAccuracy + fluctuation));
    
    data.push({
      date: date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }),
      accuracy: parseFloat(accuracy.toFixed(1)),
      runs: Math.floor(Math.random() * 3) + 1 // 运行次数
    });
  }
  
  return data;
}

// 设置趋势图时间范围
function setTrendRange(projectId, range) {
  // 更新按钮状态
  document.querySelectorAll('.trend-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  const activeBtn = document.getElementById('trendBtn' + range.charAt(0).toUpperCase() + range.slice(1));
  if (activeBtn) {
    activeBtn.classList.add('active');
  }
  
  // 保存当前选择
  if (!aiImproveState) {
    window.aiImproveState = {};
  }
  aiImproveState.trendRange = range;
  
  // 生成数据并绘制
  const trendData = generateTrendData(projectId, range);
  aiImproveState.trendData = trendData;
  
  drawTrendChart(projectId, trendData);
  
  // 更新最高最低点
  updateTrendMarkers(projectId, trendData);
}

// 绘制趋势图（使用纯Canvas）
function drawTrendChart(projectId, data) {
  const container = document.getElementById(`trendChartContainer-${projectId}`);
  if (!container || !data || data.length === 0) return;
  
  // 清除旧内容
  container.innerHTML = '';
  
  // 创建Canvas
  const canvas = document.createElement('canvas');
  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  container.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;
  
  // 边距
  const padding = { top: 40, right: 40, bottom: 50, left: 60 };
  const chartWidth = width - padding.left - padding.right;
  const chartHeight = height - padding.top - padding.bottom;
  
  // 数据范围
  const minAccuracy = Math.min(...data.map(d => d.accuracy)) - 2;
  const maxAccuracy = Math.max(...data.map(d => d.accuracy)) + 2;
  
  // 绘制网格线
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 1;
  
  // 水平网格线（5条）
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (chartHeight / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
    
    // Y轴标签
    const accuracy = maxAccuracy - ((maxAccuracy - minAccuracy) / 4) * i;
    ctx.fillStyle = '#999';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(accuracy.toFixed(0) + '%', padding.left - 10, y + 4);
  }
  
  // 绘制折线
  if (data.length > 1) {
    // 填充区域
    ctx.beginPath();
    data.forEach((point, index) => {
      const x = padding.left + (chartWidth / (data.length - 1)) * index;
      const y = padding.top + chartHeight - ((point.accuracy - minAccuracy) / (maxAccuracy - minAccuracy)) * chartHeight;
      
      if (index === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    });
    
    // 渐变填充
    const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
    gradient.addColorStop(0, 'rgba(22, 119, 255, 0.3)');
    gradient.addColorStop(1, 'rgba(22, 119, 255, 0.05)');
    
    ctx.strokeStyle = '#1677ff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    
    // 关闭路径填充
    const lastX = padding.left + chartWidth;
    const firstX = padding.left;
    ctx.lineTo(lastX, height - padding.bottom);
    ctx.lineTo(firstX, height - padding.bottom);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
  }
  
  // 绘制数据点和X轴标签
  data.forEach((point, index) => {
    const x = padding.left + (chartWidth / (data.length - 1)) * index;
    const y = padding.top + chartHeight - ((point.accuracy - minAccuracy) / (maxAccuracy - minAccuracy)) * chartHeight;
    
    // X轴标签
    ctx.fillStyle = '#666';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    
    // 每隔几个标签显示一个，避免重叠
    if (data.length <= 10 || index % Math.ceil(data.length / 10) === 0) {
      ctx.fillText(point.date, x, height - padding.bottom + 20);
    }
    
    // 数据点
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#1677ff';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // 鼠标悬停提示
    const tooltip = document.createElement('div');
    tooltip.style.position = 'absolute';
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
    tooltip.style.transform = 'translate(-50%, -100%)';
    tooltip.style.background = 'rgba(0,0,0,0.8)';
    tooltip.style.color = '#fff';
    tooltip.style.padding = '6px 10px';
    tooltip.style.borderRadius = '6px';
    tooltip.style.fontSize = '11px';
    tooltip.style.pointerEvents = 'none';
    tooltip.style.display = 'none';
    tooltip.style.zIndex = '10';
    tooltip.innerHTML = `
      <div style="font-weight:600;margin-bottom:3px">${point.date}</div>
      <div>准确率: <strong>${point.accuracy}%</strong></div>
      <div>运行: ${point.runs} 次</div>
    `;
    
    // 鼠标悬停事件
    const dot = document.createElement('div');
    dot.style.position = 'absolute';
    dot.style.left = (x - 10) + 'px';
    dot.style.top = (y - 10) + 'px';
    dot.style.width = '20px';
    dot.style.height = '20px';
    dot.style.cursor = 'pointer';
    dot.style.zIndex = '5';
    
    dot.addEventListener('mouseenter', () => {
      tooltip.style.display = 'block';
    });
    dot.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
    
    container.appendChild(dot);
    container.appendChild(tooltip);
  });
}

// 更新最高最低点标记
function updateTrendMarkers(projectId, data) {
  const markersContainer = document.getElementById(`trendMarkers-${projectId}`);
  if (!markersContainer || !data || data.length === 0) return;
  
  const maxPoint = data.reduce((max, p) => p.accuracy > max.accuracy ? p : max, data[0]);
  const minPoint = data.reduce((min, p) => p.accuracy < min.accuracy ? p : min, data[0]);
  
  markersContainer.innerHTML = `
    <div>🏆 最高准确率：<strong style="color:#52c41a">${maxPoint.accuracy}%</strong> <span style="color:#999">(${maxPoint.date})</span></div>
    <div>📉 最低准确率：<strong style="color:#ff4d4f">${minPoint.accuracy}%</strong> <span style="color:#999">(${minPoint.date})</span></div>
  `;
}

    for (let i = days - 1; i >= 0; i--) {
      const date = new Date();
      date.setDate(date.getDate() - i);
      
      const fluctuation = (Math.random() - 0.5) * 10;
      const accuracy = Math.min(99, Math.max(50, baseAccuracy + fluctuation));
      
      data.push({
        date: date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }),
        accuracy: parseFloat(accuracy.toFixed(1)),
        runs: Math.floor(Math.random() * 3) + 1
      });
    }
  }
  
  return data;
}

// 绘制历史记录趋势图
function drawHistoryTrendChart(projectId, data) {
  const container = document.getElementById(`historyTrendChartContainer-${projectId}`);
  if (!container || !data || data.length === 0) return;
  
  // 清除旧内容
  container.innerHTML = '';
  
  // 创建Canvas
  const canvas = document.createElement('canvas');
  canvas.width = container.offsetWidth;
  canvas.height = container.offsetHeight;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  container.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  const width = canvas.width;
  const height = canvas.height;
  
  // 边距
  const padding = { top: 40, right: 40, bottom: 50, left: 60 };
  const chartWidth = width - padding.left - padding.right;
  const chartHeight = height - padding.top - padding.bottom;
  
  // 数据范围
  const minAccuracy = Math.min(...data.map(d => d.accuracy)) - 2;
  const maxAccuracy = Math.max(...data.map(d => d.accuracy)) + 2;
  
  // 绘制网格线
  ctx.strokeStyle = '#f0f0f0';
  ctx.lineWidth = 1;
  
  // 水平网格线（5条）
  for (let i = 0; i <= 4; i++) {
    const y = padding.top + (chartHeight / 4) * i;
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
    
    // Y轴标签
    const accuracy = maxAccuracy - ((maxAccuracy - minAccuracy) / 4) * i;
    ctx.fillStyle = '#999';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(accuracy.toFixed(0) + '%', padding.left - 10, y + 4);
  }
  
  // 绘制折线
  if (data.length > 1) {
    // 填充区域
    ctx.beginPath();
    data.forEach((point, index) => {
      const x = padding.left + (chartWidth / (data.length - 1)) * index;
      const y = padding.top + chartHeight - ((point.accuracy - minAccuracy) / (maxAccuracy - minAccuracy)) * chartHeight;
      
      if (index === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    });
    
    // 渐变填充
    const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
    gradient.addColorStop(0, 'rgba(22, 119, 255, 0.3)');
    gradient.addColorStop(1, 'rgba(22, 119, 255, 0.05)');
    
    ctx.strokeStyle = '#1677ff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    
    // 关闭路径填充
    const lastX = padding.left + chartWidth;
    const firstX = padding.left;
    ctx.lineTo(lastX, height - padding.bottom);
    ctx.lineTo(firstX, height - padding.bottom);
    ctx.closePath();
    ctx.fillStyle = gradient;
    ctx.fill();
  }
  
  // 绘制数据点和X轴标签
  data.forEach((point, index) => {
    const x = padding.left + (chartWidth / (data.length - 1)) * index;
    const y = padding.top + chartHeight - ((point.accuracy - minAccuracy) / (maxAccuracy - minAccuracy)) * chartHeight;
    
    // X轴标签
    ctx.fillStyle = '#666';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    
    // 每隔几个标签显示一个，避免重叠
    if (data.length <= 10 || index % Math.ceil(data.length / 10) === 0) {
      ctx.fillText(point.date, x, height - padding.bottom + 20);
    }
    
    // 数据点
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#1677ff';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // 鼠标悬停提示
    const tooltip = document.createElement('div');
    tooltip.style.position = 'absolute';
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
    tooltip.style.transform = 'translate(-50%, -100%)';
    tooltip.style.background = 'rgba(0,0,0,0.8)';
    tooltip.style.color = '#fff';
    tooltip.style.padding = '6px 10px';
    tooltip.style.borderRadius = '6px';
    tooltip.style.fontSize = '11px';
    tooltip.style.pointerEvents = 'none';
    tooltip.style.display = 'none';
    tooltip.style.zIndex = '10';
    tooltip.innerHTML = `
      <div style="font-weight:600;margin-bottom:3px">${point.date}</div>
      <div>准确率: <strong>${point.accuracy}%</strong></div>
      <div>运行: ${point.runs} 次</div>
    `;
    
    // 鼠标悬停事件
    const dot = document.createElement('div');
    dot.style.position = 'absolute';
    dot.style.left = (x - 10) + 'px';
    dot.style.top = (y - 10) + 'px';
    dot.style.width = '20px';
    dot.style.height = '20px';
    dot.style.cursor = 'pointer';
    dot.style.zIndex = '5';
    
    dot.addEventListener('mouseenter', () => {
      tooltip.style.display = 'block';
    });
    dot.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
    
    container.appendChild(dot);
    container.appendChild(tooltip);
  });
}

// 更新历史记录趋势图最高最低点标记
function updateHistoryTrendMarkers(projectId, data) {
  const markersContainer = document.getElementById(`historyTrendMarkers-${projectId}`);
  if (!markersContainer || !data || data.length === 0) return;
  
  const maxPoint = data.reduce((max, p) => p.accuracy > max.accuracy ? p : max, data[0]);
  const minPoint = data.reduce((min, p) => p.accuracy < min.accuracy ? p : min, data[0]);
  
  markersContainer.innerHTML = `
    <div>🏆 最高准确率：<strong style="color:#52c41a">${maxPoint.accuracy}%</strong> <span style="color:#999">(${maxPoint.date})</span></div>
    <div>📉 最低准确率：<strong style="color:#ff4d4f">${minPoint.accuracy}%</strong> <span style="color:#999">(${minPoint.date})</span></div>
  `;
}

function loadFeedbackData() {
  const projId = document.getElementById('feedbackProjId')?.value?.toLowerCase() || '';
  const projName = document.getElementById('feedbackProjName')?.value || '';
  
  let filtered = aiFeedbackSupervisionData.filter(item => {
    if (projId && !item.projId.toLowerCase().includes(projId)) return false;
    if (projName && !item.projName.includes(projName)) return false;
    return true;
  });
  
  renderFeedbackData(filtered);
}

function saveFeedbackEdit(id) {

  const suggestion = document.getElementById('editFeedbackSuggestion')?.value;
  const desc = document.getElementById('editFeedbackDesc')?.value;

  const prescreenEnabled = document.getElementById('editPrescreenEnabled')?.checked;
  const enrolEnabled = document.getElementById('editEnrolEnabled')?.checked;

  if (desc) item.desc = desc;

  if (enrolEnabled !== undefined) item.enrolEnabled = enrolEnabled;
  
  closeFeedbackEditModal();
  loadFeedbackData();
  alert('✅ 保存成功！');

function deleteFeedback(id) {
  const item = aiFeedbackSupervisionData.find(d => d.id === id);
  if (!item) return;
  
  if (!confirm(`确认要删除 "${item.desc}" 这条改进意见吗？`)) return;
  
  const index = aiFeedbackSupervisionData.findIndex(d => d.id === id);
  if (index > -1) {
    aiFeedbackSupervisionData.splice(index, 1);
    loadFeedbackData();
    alert('✅ 删除成功！');
  }
}

function openWechatReport(pid) {
  // 如果模态框已存在且已渲染,直接显示
  const modal = document.getElementById('wechatReportModal');
  if(modal && modal.querySelector('.wechat-report-content')) {
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    return;
  }
  
  // 如果模态框不存在或为空,创建新的
  const proj = aiReportProjects.find(p => p.id === pid) || aiReportProjects[0];
  const aiOverReject = Math.round(proj.cases * proj.passRate / 100) - Math.round(proj.cases * proj.aiAccuracy / 100);
  const humanRejectAiPass = Math.round(proj.cases * 0.04);
  const bothAgreeReject = proj.cases - Math.round(proj.cases * proj.passRate / 100) + humanRejectAiPass;
  
  const content = buildWechatReportContent(pid, proj, aiOverReject, humanRejectAiPass, bothAgreeReject);
  
  if(modal) {
    modal.innerHTML = content;
    modal.style.display = 'flex';
  } else {
    // 创建模态框
    const newModal = document.createElement('div');
    newModal.id = 'wechatReportModal';

function closeWechatReport() {
  const modal = document.getElementById('wechatReportModal');
  if(modal) {
    const inner = modal.querySelector('div');
    if(inner) {
      inner.style.animation = 'slideDown 0.2s ease forwards';
      setTimeout(() => {
        modal.style.display = 'none';

        document.body.style.overflow = '';
      }, 180);
    } else {

    }
  }

function wechatScrollTo(target) {
  if(target === 'wechat-improvements') {
    const el = document.getElementById('wechat-improvements');
    if(el) {
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }
}

function wechatTogglePhase(impId, phase, checked) {
  const btnId = phase === 'prescreen' ? `wc-pre-btn-${impId}` : `wc-enr-btn-${impId}`;
  try {
    const imp = editableImprovements.find(i => i.id === impId);
    if(imp) {
      imp.phases[phase] = checked;
      imp.enabled = imp.phases.prescreen || imp.phases.enrolling;
      const mainCheckbox = document.querySelector(`.improve-toggle[data-id="${impId}"]`);
      if(mainCheckbox) mainCheckbox.checked = imp.enabled;
    }
  } catch(e) {}
  showWechatToast(checked ? '已启用' : '已关闭');
}

function wechatSaveAll(pid) {
  showWechatToast('✅ 所有修改已保存！');

  }, 1500);
}

function saveWechatSuggestion(impId, field, value) {
  try {
    const imp = editableImprovements.find(i => i.id === impId);
    if(imp) {
      imp[field] = value;
    }
  } catch(e) {}
}

function toggleEditSection(header) {
  const card = header.parentElement;
  const arrow = header.querySelector('.edit-section-arrow');
  const body = card.querySelector('.edit-section-body');
  
  if (body.classList.contains('collapsed')) {

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  uploadedFiles.push(file.name);
  // 重新渲染文件列表区域
  const fileList = document.getElementById('fileList');
  if(fileList) {
    fileList.innerHTML = uploadedFiles.map((f,i)=>`
      <div class="protocol-file-item">
        <div>
          <span class="file-icon"><i class="fa-solid fa-file-pdf"></i></span>
          ${f}
        </div>
        <span class="file-delete" onclick="event.stopPropagation();removeFile(${i})" title="删除"><i class="fa-solid fa-xmark"></i></span>
      </div>
    `).join('');
  }
  // 隐藏上传区域或在有文件时保留它
  event.target.value = '';
  showWechatToast('文件上传成功');
}

// 查看审核流程弹窗
function viewTemplateFlow(id) {
  const t = window._refTemplates.find(t => t.id === id);
  if(!t) return;

  const flowSteps = getTemplateFlowDetail(t.type, t.stage);
  const typeTagMap = {
    '预筛审核':'<span class="edit-tag edit-tag-blue">预筛审核</span>',
    '主知情审核':'<span class="edit-tag edit-tag-orange">主知情审核</span>',
    '导入审核':'<span class="edit-tag edit-tag-teal">导入审核</span>',
    '入组审核':'<span class="edit-tag edit-tag-green">入组审核</span>'
  };
 
  const stepsHtml = flowSteps.map((s,i) => {
    // 第一步：发起人 | 最后一步：结束 | 中间：审核人
    const isFirst = i === 0;
    const isLast = i === flowSteps.length - 1;
    const stepType = isFirst ? 'initiator' : isLast ? 'finish' : 'approver';
    const roleLabel = isFirst ? '发起人' : isLast ? '流程结束' : '审核人';
    const nodes = [];
    // 连线（非第一步）
    if(i > 0) {
      nodes.push(`
      <div class="flow-connector-line"></div>
      <div class="flow-connector-icon"><i class="fa-solid fa-plus"></i></div>
      <div class="flow-connector-line"></div>`);
    }
    // 步骤卡片
    nodes.push(`
    <div class="flow-step-item ${stepType}">

function toggleRefRow(tr) {
  const chk = tr.querySelector('input[type="checkbox"]');
  if(chk) { chk.checked = !chk.checked; onRefCheckChange(chk); }
}

function onRefCheckChange(chk) {
  const id = parseInt(chk.value);
  const tr = document.getElementById('refRow_'+id);
  if(chk.checked) {
    window._refSelected.add(id);
    if(tr) tr.classList.add('selected');
  } else {
    window._refSelected.delete(id);
    if(tr) tr.classList.remove('selected');
  }
  document.getElementById('refSelectedCount').textContent = window._refSelected.size;
}

function toggleSelectAllRef() {
  const visibleRows = document.querySelectorAll('#refTemplateTableBody tr[data-id]');
  const visibleIds = Array.from(visibleRows).map(r => parseInt(r.dataset.id));
  if(visibleIds.length === 0) return;
  const allSelected = visibleIds.every(id => window._refSelected.has(id));
  visibleIds.forEach(id => {
    const chk = document.getElementById('refChk_'+id);
    if(chk) {
      chk.checked = !allSelected;
      const tr = document.getElementById('refRow_'+id);
      if(!allSelected) { window._refSelected.add(id); if(tr) tr.classList.add('selected'); }
      else { window._refSelected.delete(id); if(tr) tr.classList.remove('selected'); }
    }
  });
  document.getElementById('refSelectedCount').textContent = window._refSelected.size;
}

function filterRefTemplates() {
  if(!window._refTemplates) return;
  const nameK = (document.getElementById('refNameFilter')?.value || '').trim().toLowerCase();
  const filtered = window._refTemplates.filter(t => {
    if(nameK && !t.name.toLowerCase().includes(nameK)) return false;
    return true;
  });
  const tbody = document.getElementById('refTemplateTableBody');
  const countEl = document.getElementById('refTotalCount');
  if(tbody) tbody.innerHTML = renderRefFlowTreeRows(filtered);
  if(countEl) countEl.textContent = filtered.length;
  // 恢复已选中的复选框状态
  window._refSelected.forEach(id => {
    const chk = document.getElementById('refChk_'+id);
    const tr = document.getElementById('refRow_'+id);
    if(chk) chk.checked = true;
    if(tr) tr.classList.add('selected');
  });
  document.getElementById('refSelectedCount').textContent = window._refSelected.size;
}

function resetRefFilters() {
  const el = ['refNameFilter'];
  el.forEach(id => { const e = document.getElementById(id); if(e) e.value = ''; });
  filterRefTemplates();

// 直接使用 _flowTemplateData 中的数据，保持数据结构一致
let _projectApprovalTemplates = [];

function renderProjectApprovalRows() {
  const typeTag = {'预筛审核':'edit-tag-blue','主知情审核':'edit-tag-orange','导入审核':'edit-tag-teal','入组审核':'edit-tag-green'};
  
  // 获取已引用的模板
  if(_projectApprovalTemplates.length === 0) {
    return '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999">暂无审批流配置<br><span style="font-size:12px;color:#bbb">请引用模板或新建模板</span></td></tr>';
  }
  
  let html = '';
  _projectApprovalTemplates.forEach(template => {
    const flows = template.flows || [];
    const mainFlow = flows.find(f => f.isMainFlow);
    
    // 计算模板整体状态（只要有一个生效就算生效）
    const hasActive = flows.some(f => f.isActive);
    const activeCount = flows.filter(f => f.isActive).length;
    const totalCount = flows.length;
    
    // 第一级：模板行（可展开）
    const escapedName = template.name.replace(/'/g, "\\'");
    html += `<tr data-template-name="${template.name}" style="background:#fafbfc;cursor:pointer" onclick="toggleProjectTemplateRow('${escapedName}')">`;
    html += '<td colspan="2" style="font-weight:bold;font-size:14px;padding-left:20px">';
    html += '<i class="fa-solid fa-folder-open" style="color:#1677ff;margin-right:6px"></i>'+template.name;
    html += '<span style="font-weight:normal;font-size:12px;color:#999;margin-left:10px">共 '+flows.length+' 个流程</span>';
    if(mainFlow) {
      html += '<span style="margin-left:8px"><span class="edit-tag edit-tag-purple">★ 主流程 </span></span>';
    }
    html += '</td>';
    html += '<td>-</td>';
    html += '<td><span class="edit-tag '+(hasActive?'edit-tag-green':'')+ '" style="'+(hasActive?'':'background:#f5f5f5;color:#999;border:1px solid #d9d9d9')+'">● '+(hasActive?'生效':'未生效')+'</span></td>';
    html += '<td>-</td>';
    html += '<td>-</td>';
   
    html += '<td style="white-space:nowrap">';
    html += `<span class="action-link" onclick="event.stopPropagation();editProjectTemplate('${escapedName}')">编辑</span>`;
    if(hasActive) {
      html += ` <span class="action-link warn" onclick="event.stopPropagation();toggleProjectTemplateActive('${escapedName}',false)">停用</span>`;
    } else {
      html += ` <span class="action-link" onclick="event.stopPropagation();toggleProjectTemplateActive('${escapedName}',true)">生效</span>`;
    }
    html += ` <span class="action-link danger" onclick="event.stopPropagation();deleteProjectTemplate('${escapedName}')">删除</span>`;
    html += ` <span class="action-link process" onclick="event.stopPropagation();setMainFlow('${escapedName}')">主流程设置</span>`;
    html += '</td>';
    html += '</tr>';
    
    // 第二级：流程节点行
    flows.forEach((flow, flowIdx) => {
      const isActiveTag = flow.isActive ? '<span class="edit-tag edit-tag-green">● 生效中</span>' : '<span class="edit-tag" style="background:#f5f5f5;color:#999;border:1px solid #d9d9d9">● 未生效</span>';
      const isMainFlowTag = flow.isMainFlow ? '<span class="edit-tag edit-tag-purple" style="margin-left:8px">★ 主流程</span>' : '';
      const acts = [
        '<span class="action-link process" onclick="viewProjectApprovalProcess('+template.id+','+flowIdx+')">查看审核流程</span>',
        '<span class="action-link danger" onclick="deleteProjectApprovalFlow('+template.id+','+flowIdx+')">删除</span>'
      ];
      html += '<tr data-parent-template="'+escapedName+'" style="background:#fff">';
      html += '<td style="padding-left:50px"><strong>'+flow.workflowVer+'</strong></td>';
      html += '<td><i class="fa-solid fa-circle-dot" style="color:#ccc;font-size:8px;margin-right:6px"></i>'+flow.workflowName+isMainFlowTag+'</td>';
      html += '<td><span class="edit-tag '+(typeTag[flow.auditType]||'')+'">'+flow.auditType+'</span></td>';
      html += '<td>-</td>';
      html += '<td>-</td>';
      html += '<td>-</td>';
      html += '<td style="white-space:nowrap">'+acts.join(' <span style="color:#e0e0e0">|</span> ')+'</td>';
      html += '</tr>';
    });
  });
  
  return html;
}

// 切换项目管理中模板行的展开/收起
function toggleProjectTemplateRow(templateName) {
  const templateRow = document.querySelector('tr[data-template-name="'+templateName.replace(/'/g, "\\'")+'"]');
  if(!templateRow) return;
  
  // 查找该模板下的所有子行
  const childRows = document.querySelectorAll('tr[data-parent-template="'+templateName.replace(/'/g, "\\'")+'"]');
  
  // 切换显示状态
  childRows.forEach(row => {
    row.style.display = row.style.display === 'none' ? '' : 'none';
  });
  
  // 更新图标
  const icon = templateRow.querySelector('.fa-folder-open, .fa-folder');
  if(icon) {
    if(childRows.length > 0 && childRows[0].style.display !== 'none') {
      icon.classList.remove('fa-folder-open');
      icon.classList.add('fa-folder');
    } else {
      icon.classList.remove('fa-folder');
      icon.classList.add('fa-folder-open');
    }
  }
}

// 删除流程节点（从模板中移除某个流程）
function deleteProjectApprovalFlow(templateId, flowIdx) {
  const template = _projectApprovalTemplates.find(t => t.id === templateId);
  if(!template || !template.flows || !template.flows[flowIdx]) return;
  
  const flow = template.flows[flowIdx];
  if(confirm('确定要从模板中移除流程「'+flow.workflowName+'」吗？')) {
    template.flows.splice(flowIdx, 1);
    // 如果删除的是主流程，清除主流程标记
    if(flow.isMainFlow) {
      template.flows.forEach(f => f.isMainFlow = false);
    }
    document.getElementById('projectApprovalTableBody').innerHTML = renderProjectApprovalRows();
  }
}

  window._refSelected.forEach(id => {

    if(!tpl) return;
    
    // 如果已存在则更新，否则添加
    let projectTpl = _projectApprovalTemplates.find(p => p.id === tpl.id);
    if(!projectTpl) {
      projectTpl = JSON.parse(JSON.stringify(tpl));
      _projectApprovalTemplates.push(projectTpl);
    }
    
    // 设置生效状态和主流程
    projectTpl.flows.forEach(flow => {
      flow.isActive = isActive;
    });
    if(!projectTpl.flows.some(f => f.isMainFlow)) {
      projectTpl.flows[0].isMainFlow = true;
    }
  });

  document.getElementById('projectApprovalTableBody').innerHTML = renderProjectApprovalRows();
  closeRefAndProductEdit();
  closeRefTemplateModal();

  showWechatToast('已引用并生效 ' + window._refSelected.size + ' 个流程模板');
}

// ===== 审核人联想搜索（模糊匹配） =====
let reviewerCurrentFlow = '';
let reviewerActiveIndex = -1;

// 过滤并显示联想下拉
function filterReviewerSuggestions() {
  const input = document.getElementById('submitAuditReviewer');
  const dropdown = document.getElementById('reviewerDropdown');
  const query = (input?.value || '').trim().toLowerCase();
  if(!query) {
    hideReviewerDropdown();
    updateReviewerInputStyle(false);
    return;
  }
  // 从当前流程的推荐人中优先匹配，也可以匹配全局审核人
  let candidates;
  if(reviewerCurrentFlow) {
    const recommended = getRecommendedReviewers(reviewerCurrentFlow);
    const others = submitAuditReviewers.filter(r => !recommended.includes(r));
    // 模糊匹配：拼音、中文名均可
    const matchFn = (r) => r.label.includes(query) || r.pinyin.includes(query) || r.value.includes(query);
    candidates = [...recommended.filter(matchFn), ...others.filter(matchFn)];
  } else {
    candidates = submitAuditReviewers.filter(r => r.label.includes(query) || r.pinyin.includes(query) || r.value.includes(query));
  }
  reviewerActiveIndex = -1;
  if(candidates.length === 0) {
    dropdown.innerHTML = '<div class="autocomplete-noresult">未找到匹配的审核人</div>';
  } else {
    dropdown.innerHTML = candidates.map((r, i) => {
      const isRecommended = reviewerCurrentFlow && r.flows.includes(reviewerCurrentFlow);
      const highlighted = r.label.replace(new RegExp('(' + escapeRegExp(query) + ')', 'gi'), '<span class="match-highlight">$1</span>');
      return `<div class="autocomplete-item" data-value="${r.value}" data-label="${r.label}" data-idx="${i}" 
        onmousedown="event.preventDefault();selectReviewer('${r.value}','${r.label}')"
        onmouseenter="setReviewerActive(${i})">
        <span>${highlighted}</span>
        <span class="flow-tag ${isRecommended ? 'recommended' : ''}">${isRecommended ? '推荐' : r.flows.slice(0,2).join('/')}</span>
      </div>`;
    }).join('');
  }
  dropdown.classList.add('open');
  updateReviewerInputStyle(false);
}

function showReviewerDropdown() {
  const input = document.getElementById('submitAuditReviewer');
  if(input && input.value.trim()) {
    filterReviewerSuggestions();
  } else {
    // 显示当前流程的所有推荐审核人
    showAllReviewers();
  }
}

function showAllReviewers() {
  const dropdown = document.getElementById('reviewerDropdown');
  let candidates;
  if(reviewerCurrentFlow) {
    const recommended = getRecommendedReviewers(reviewerCurrentFlow);
    const others = submitAuditReviewers.filter(r => !recommended.includes(r));
    candidates = [...recommended, ...others];
  } else {
    candidates = [...submitAuditReviewers];
  }
  reviewerActiveIndex = -1;
  dropdown.innerHTML = candidates.map((r, i) => {
    const isRecommended = reviewerCurrentFlow && r.flows.includes(reviewerCurrentFlow);
    return `<div class="autocomplete-item" data-value="${r.value}" data-label="${r.label}" data-idx="${i}"
      onmousedown="event.preventDefault();selectReviewer('${r.value}','${r.label}')"
      onmouseenter="setReviewerActive(${i})">

      <span class="flow-tag ${isRecommended ? 'recommended' : ''}">${isRecommended ? '推荐' : r.flows.slice(0,2).join('/')}</span>
    </div>`;
  }).join('');
  dropdown.classList.add('open');
}

  const dropdown = document.getElementById('reviewerDropdown');
  if(dropdown) dropdown.classList.remove('open');
}

  // 如果该审核人不在当前流程推荐中，给出提示
  if(reviewerCurrentFlow) {
