        <div class="submit-audit-for -row">     
          <label class="submit-audit-form-label required">审核流程</label>
          <div class="submit-audit-form-control">
            <select class="submit-audit-select" id="submitAuditFlow" onchange="checkNonRecommendedFlow()">
              <option value="">请选择审核流程</option>
              ${submitAuditFlows.map(f => `<option value="${f.value}" ${f.value === recommended.flow ? 'selected' : ''}>${f.label}</option>`).join('')}
            </select>
            <div style="margin-top:6px;padding:8px 12px;background:#f0f5ff;border:1px solid #d6e4ff;border-radius:6px;display:flex;align-items:flex-start;gap:8px">
              <i class="fa-solid fa-lightbulb" style="color:#1677ff;font-size:13px;margin-top:1px;flex-shrink:0"></i>
              <div style="font-size:12px;color:#1d39c4;line-height:1.6">
                <strong>推荐：${recommended.label}</strong>
                <div style="margin-top:4px;padding-top:4px;border-top:1px dashed #d6e4ff;color:#85a5ff">项目审核链路：<strong>预筛审核</strong> → <strong>主知情审核</strong> → <strong>入组审核</strong></div>
              </div>
            </div>
            <!-- 非推荐流程提示区域 -->
            <div id="nonRecommendedWarning" class="non-recommended-inline" style="display:none;">
              <div class="non-recommended-inline-header">
                <div class="non-recommended-inline-icon">
                  <i class="fa-solid fa-exclamation-triangle"></i>
                </div>
                <div class="non-recommended-inline-title">
                  检测到您选择的是非标准审核流程，请填写原因，以便审核人确认
                </div>
              </div>
              <textarea class="non-recommended-inline-textarea" id="nonRecommendedReasonInline" placeholder="请输入选择非标准流程的原因..."></textarea>
            </div>
          </div>
        </div>
        <div class="submit-audit-form-row">
          <label class="submit-audit-form-label required">审核人</label>
          <div class="submit-audit-form-control">
            <div class="autocomplete-wrapper" id="reviewerAutocomplete">
              <input
                type="text"
                class="autocomplete-input"
                id="submitAuditReviewer"
                placeholder="输入姓名模糊搜索审核人&#10;"
                autocomplete="off"
               
              />
              <div class="autocomplete-dropdown" id="reviewerDropdown"></div>
              <input type="hidden" id="submitAuditReviewerValue" />
            </div>
            <div id="reviewerHintPanel" style="margin-top:4px;font-size:11px;color:#999;display:flex;align-items:center;gap:4px">
              <i class="fa-solid fa-lightbulb" style="color:#1677ff;font-size:11px"></i>
              <span id="reviewerHintText">输入姓名或拼音搜索，推荐审核人排在前面</span>
            </div>
          </div>
        </div>
        
        <div class="submit-audit-form-row">
          <label class="submit-audit-form-label">重点关注</label>
          <div class="submit-audit-form-control" style="line-height:34px;display:flex;align-items:center">
            <span style="font-size:13px;color:#888;">无重点关注项</span>
            <a class="submit-audit-ref-link" onclick="openRefKeyConcern('${schemeNo}', ${patientIndex})">引用</a>
          </div>
        </div>
        <div class="submit-audit-form-row">
          <label class="submit-audit-form-label">备注</label>
          <div class="submit-audit-form-control">
            <textarea class="submit-audit-textarea" id="submitAuditRemark" placeholder="请输入备注"></textarea>
          </div>
        </div>
      </div>
      <div class="submit-audit-footer">
        <button class="submit-audit-btn submit-audit-btn-cancel" onclick="closeSubmitAuditModal()">取消</button>
        <button class="submit-audit-btn submit-audit-btn-submit" onclick="submitAudit('${schemeNo}', ${patientIndex})">
          <i class="fa-solid fa-check"></i> 提交审核
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  document.body.style.overflow = 'hidden';

  // 点击遮罩关闭
  modal.addEventListener('click', function(e) {
    if(e.target === modal) closeSubmitAuditModal();
  });

  // ESC 关闭
  const escHandler = function(e) {
    if(e.key === 'Escape') { closeSubmitAuditModal(); document.removeEventListener('keydown', escHandler); }
  };
  document.addEventListener('keydown', escHandler);

  // 初始化审核流程推荐审核人
  const initialFlow = document.getElementById('submitAuditFlow')?.value;
  if(initialFlow) updateReviewerHint(initialFlow);

  // 审核流程变更时自动更新推荐审核人，并展开联想下拉
  const flowSelect = document.getElementById('submitAuditFlow');
  if(flowSelect) {
    flowSelect.addEventListener('change', function() {
      const selectedFlow = this.value;
      updateReviewerHint(selectedFlow);
      // 清空之前选择的审核人（如果不在新流程推荐中）
      const currentReviewerVal = document.getElementById('submitAuditReviewerValue')?.value;
      if(currentReviewerVal) {
        const reviewer = submitAuditReviewers.find(r => r.value === currentReviewerVal);
        if(!reviewer || !reviewer.flows.includes(selectedFlow)) {
          document.getElementById('submitAuditReviewer').value = '';
          document.getElementById('submitAuditReviewerValue').value = '';
          updateReviewerInputStyle(false);
        }
      }
      // 自动展开联想下拉，方便快速选择推荐审核人
      if(selectedFlow) { showAllReviewers(); }
    });
  }

  // 点击弹窗其他区域关闭联想下拉
  document.addEventListener('click', function closeDropdown(e) {
    const wrapper = document.getElementById('reviewerAutocomplete');
    const dropdown = document.getElementById('reviewerDropdown');
    if(wrapper && dropdown && !wrapper.contains(e.target)) {
      dropdown.classList.remove('open');
    }
  }, { once: true });
}

function closeSubmitAuditModal() {
  const modal = document.getElementById('submitAuditModal');
  if(modal) { modal.remove(); }
  document.body.style.overflow = '';
}

function submitAudit(schemeNo, patientIndex) {
  const reviewerValue = document.getElementById('submitAuditReviewerValue')?.value;
  const reviewerLabel = document.getElementById('submitAuditReviewer')?.value;
  const flow = document.getElementById('submitAuditFlow')?.value;
  const remark = document.getElementById('submitAuditRemark')?.value || '';

  if(!reviewerValue) {
    showWechatToast('请选择审核人');
    return;
  }
  if(!flow) {
    showWechatToast('请选择审核流程');
    return;
  }

  // 检查是否选择了非推荐流程
  if(currentRecommendedFlow && flow !== currentRecommendedFlow) {
    // 获取内联原因输入框的值
    const reason = document.getElementById('nonRecommendedReasonInline')?.value.trim();
    
    if(!reason) {
      showWechatToast('检测到您选择的是非标准审核流程，请填写原因');
      // 聚焦到原因输入框
      setTimeout(() => {
        const textarea = document.getElementById('nonRecommendedReasonInline');
        if(textarea) textarea.focus();
      }, 100);
      return;
    }
    
    // 将原因添加到备注中
    const fullRemark = remark ? remark + '\n\n【非推荐流程原因】' + reason : '【非推荐流程原因】' + reason;
    
    // 执行提交
    doSubmitAudit(schemeNo, patientIndex, flow, reviewerValue, reviewerLabel, fullRemark);
  } else {
    // 直接提交（选择的是推荐流程）
    doSubmitAudit(schemeNo, patientIndex, flow, reviewerValue, reviewerLabel, remark);
  }
}

// 执行实际的审核提交
function doSubmitAudit(schemeNo, patientIndex, flow, reviewerValue, reviewerLabel, remark) {
  const patients = scPatientData[schemeNo] || [];
  const patient = patients[patientIndex];
  if(!patient) { closeSubmitAuditModal(); return; }

  const reviewerName = reviewerLabel || reviewerValue;
  const flowLabel = submitAuditFlows.find(f => f.value === flow)?.label || flow;

  closeSubmitAuditModal();

  // 更新患者状态
  patient.patientStatus = '待审核';
  document.getElementById('scContent').innerHTML = buildScPatientListContent();

  showWechatToast('审核提交成功！<br>审核流程：' + flowLabel + '｜审核人：' + reviewerName + '｜患者：' + patient.patientNo);
}

// 引用重点关注的弹窗
function openRefKeyConcern(schemeNo, patientIndex) {
  const patients = scPatientData[schemeNo] || [];
  const patient = patients[patientIndex];
  if(!patient) return;

  let modal = document.getElementById('refKeyConcernModal');
  if(modal) modal.remove();

  // 模拟已有的重点关注项数据
  const concerns = [
    { id:1, label:'高血压病史', checked:false },
    { id:2, label:'肝功能异常指标', checked:false },
    { id:3, label:'肾功能不全', checked:false },
    { id:4, label:'既往用药史有禁忌', checked:false },
    { id:5, label:'过敏体质', checked:false }
  ];

  modal = document.createElement('div');
  modal.id = 'refKeyConcernModal';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:100002;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:12px;width:440px;max-width:95vw;max-height:70vh;box-shadow:0 20px 60px rgba(0,0,0,0.25);display:flex;flex-direction:column">
      <div style="padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <span style="font-size:15px;font-weight:600;color:#333"><i class="fa-solid fa-triangle-exclamation" style="color:#faad14;margin-right:8px"></i>引用重点关注项</span>
        <button style="background:none;border:none;font-size:18px;color:#999;cursor:pointer;line-height:1" onclick="closeRefKeyConcern()">&times;</button>
      </div>
      <div style="padding:16px 20px;overflow-y:auto;flex:1">
        <div style="font-size:12px;color:#888;margin-bottom:12px">勾选需要引用的重点关注项，提交后将同步到审核流程中</div>
        ${concerns.map(c => `
          <label style="display:flex;align-items:center;padding:10px 12px;border:1px solid #f0f0f0;border-radius:6px;margin-bottom:8px;cursor:pointer;transition:background 0.15s" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background='#fff'">
            <input type="checkbox" value="${c.id}" class="ref-concern-check" style="accent-color:#165DFF;margin-right:10px" />
            <span style="font-size:13px;color:#333">${c.label}</span>
          </label>
        `).join('')}
      </div>
      <div style="padding:12px 20px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0">
        <button style="padding:7px 18px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;color:#333;font-size:13px;cursor:pointer" onclick="closeRefKeyConcern()">取消</button>
        <button style="padding:7px 18px;border:none;border-radius:6px;background:#165DFF;color:#fff;font-size:13px;cursor:pointer" onclick="confirmRefKeyConcern()"><i class="fa-solid fa-check"></i> 确认引用</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);

  // 点击遮罩关闭
  modal.addEventListener('click', function(e) {
    if(e.target === modal) closeRefKeyConcern();
  });
}

function closeRefKeyConcern() {
  const modal = document.getElementById('refKeyConcernModal');
  if(modal) { modal.remove(); }
}

function confirmRefKeyConcern() {
  const checks = document.querySelectorAll('.ref-concern-check:checked');
  const labels = Array.from(checks).map(cb => {
    const label = cb.parentElement.querySelector('span');
    return label ? label.textContent : '';
  }).filter(Boolean);

  closeRefKeyConcern();

  if(labels.length > 0) {
    showWechatToast('已引用重点关注项：' + labels.join('、'));
  } else {
    showWechatToast('未选择任何重点关注项');
  }
}

// ==================== 页面加载时检查登录状态 ====================
window.addEventListener('DOMContentLoaded', function() {
  // 检查URL参数中是否有logged=1，如果有则自动跳过登录页
  const urlParams = new URLSearchParams(window.location.search);
  const logged = urlParams.get('logged');
  
  if (logged === '1') {
    // 自动登录，隐藏登录页，显示主应用
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    
    // 获取module参数，切换到对应模块
    const module = urlParams.get('module') || 'audit';
    switchModule(module);
    
    // 移除URL中的logged参数（保持URL干净）
    urlParams.delete('logged');
    const newUrl = window.location.pathname + (urlParams.toString() ? '?' + urlParams.toString() : '');
    window.history.replaceState({}, '', newUrl);
  }
});
</script>
