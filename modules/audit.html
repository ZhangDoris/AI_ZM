<div id="audit-module">
  <div class="breadcrumb">当前位置：<span onclick="switchModule('audit','list')">审批</span> / 审批列表</div>
  
  <!-- Org-level Tabs -->
  <div class="org-tabs">
    <div class="org-tab active" onclick="setAuditOrg('hengrui')">恒瑞医药</div>
    <div class="org-tab" onclick="setAuditOrg('kexin')">江苏科信</div>
    <div class="org-tab" onclick="setAuditOrg('yunying')">运营二部</div>
  </div>

  <!-- Sub-tabs -->
  <div class="sub-tabs-wrap">
    <div class="sub-tab active" onclick="setAuditSubTab('pending')">待审批</div>
    <div class="sub-tab" onclick="setAuditSubTab('done')">已审批列表</div>
    <span style="margin-left:auto;font-size:12px;color:#aaa" id="auditCount">共 0 条</span>
  </div>

  <!-- Filter Form -->
  <div class="filter-form-wrap" style="border-radius:0 0 12px 12px">
    <div class="filter-form-grid">
      <div class="filter-form-item">
        <span class="filter-form-label">筛选号</span>
        <input class="filter-form-input" placeholder="请输入" />
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">患者编号</span>
        <input class="filter-form-input" placeholder="请输入" />
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">方案编号</span>
        <input class="filter-form-input" placeholder="请输入" />
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">审批类型</span>
        <select class="filter-form-select"><option>请选择</option><option>预筛审批</option><option>入组审批</option></select>
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">中心名称</span>
        <input class="filter-form-input" placeholder="请输入" />
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">审批状态</span>
        <select class="filter-form-select"><option>请选择</option><option>待审批</option><option>已通过</option><option>已拒绝</option></select>
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">待操作人</span>
        <input class="filter-form-input" placeholder="请输入" />
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">待审批人</span>
        <input class="filter-form-input" placeholder="请输入" />
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">提交日期</span>
        <div class="filter-form-date-range">
          <input type="date" placeholder="开始日期" />
          <span>~</span>
          <input type="date" placeholder="结束日期" />
        </div>
      </div>
      <div class="filter-form-item">
        <span class="filter-form-label">是否发送邮件</span>
        <select class="filter-form-select"><option>请选择</option><option>是</option><option>否</option></select>
      </div>
      <div class="filter-form-item" style="grid-column: span 2;">
        <span class="filter-form-label">排序</span>
        <select class="filter-form-select"><option>请选择</option><option>提交日期</option><option>匹配率</option></select>
        <select class="filter-form-select" style="margin-left:8px"><option>请选择</option><option>升序</option><option>降序</option></select>
      </div>
    </div>
    <div class="filter-form-actions">
      <button class="btn-filter primary">查询</button>
      <button class="btn-filter">重置</button>
      <button class="btn-filter">导出</button>
      <button class="btn-filter">患者字展示</button>
      <button class="btn-filter">列设置</button>
      <button class="btn-filter">高级搜索</button>
      <span class="spacer"></span>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card" style="margin-top:16px">
    <table class="proj-table">
      <thead>
        <tr>
          <th style="width:50px">序号</th>
          <th style="min-width:140px">筛选号</th>
          <th style="width:80px">患者编号</th>
          <th style="min-width:180px">方案名称</th>
          <th style="width:80px">审批类型</th>
          <th style="min-width:100px">中心名称</th>
          <th style="width:80px">审批状态</th>
          <th style="min-width:80px">待操作人</th>
          <th style="min-width:140px">提交时间</th>
          <th style="width:80px">操作</th>
        </tr>
      </thead>
      <tbody id="auditTableBody">
        <!-- 数据将通过JavaScript动态加载 -->
      </tbody>
    </table>
  </div>
</div>

<script>
// 审批模块初始化
function initAuditModule(subModule) {
  console.log('初始化审批模块:', subModule);
  // 这里可以添加审批模块特定的初始化逻辑
  loadAuditData();
}

// 加载审批数据
function loadAuditData() {
  // 模拟数据加载
  const auditData = [
    {
      id: 1,
      screenNo: 'SCR-2024-001',
      patientNo: 'PT-001',
      planName: 'XXX临床试验方案',
      auditType: '预筛审批',
      center: '北京协和医院',
      status: '待审批',
      operator: '张三',
      submitTime: '2024-01-15 10:30',
      actions: '查看'
    },
    // 更多数据...
  ];
  
  const tbody = document.getElementById('auditTableBody');
  if (tbody) {
    tbody.innerHTML = auditData.map((item, index) => `
      <tr>
        <td>${index + 1}</td>
        <td style="font-size:13px;color:#1a1a1a">${item.screenNo}</td>
        <td>${item.patientNo}</td>
        <td style="font-size:12.5px;color:#666">${item.planName}</td>
        <td><span class="badge badge-blue">${item.auditType}</span></td>
        <td style="font-size:12.5px">${item.center}</td>
        <td><span class="badge badge-yellow">${item.status}</span></td>
        <td style="font-size:12.5px">${item.operator}</td>
        <td style="font-size:12px;color:#888">${item.submitTime}</td>
        <td>
          <button class="btn btn-default btn-sm" style="padding:2px 8px;font-size:11px" onclick="viewAuditDetail(${item.id})">${item.actions}</button>
        </td>
      </tr>
    `).join('');
    
    // 更新计数
    document.getElementById('auditCount').textContent = `共 ${auditData.length} 条`;
  }
}

// 查看审批详情
function viewAuditDetail(id) {
  alert(`查看审批详情 ID: ${id}`);
}

// 设置机构
function setAuditOrg(org) {
  console.log('设置机构:', org);
  // 更新UI和加载数据
  document.querySelectorAll('.org-tab').forEach(tab => tab.classList.remove('active'));
  event.target.classList.add('active');
  loadAuditData();
}

// 设置子标签
function setAuditSubTab(tab) {
  console.log('设置子标签:', tab);
  // 更新UI和加载数据
  document.querySelectorAll('.sub-tab').forEach(tab => tab.classList.remove('active'));
  event.target.classList.add('active');
  loadAuditData();
}
</script>
